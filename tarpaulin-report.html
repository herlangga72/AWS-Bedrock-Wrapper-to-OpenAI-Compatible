te::infrastructure::bedrock::converse::build_converse_payload;\nuse crate::shared::app_state::AppState;\n\nuse aws_sdk_bedrockruntime::{\n    types::{ContentBlock as BContentBlock, ContentBlockDelta, ConverseOutput as OutputEnum, ConversationRole, InferenceConfiguration, Message as BedrockMessage, SystemContentBlock},\n    Client as RuntimeClient,\n};\nuse axum::{\n    extract::State,\n    http::{HeaderMap, StatusCode},\n    response::{sse::{Event, KeepAlive, Sse}, IntoResponse, Response},\n    Json,\n};\nuse axum_extra::{headers::{authorization::Bearer, Authorization}, TypedHeader};\nuse futures_util::Stream;\nuse serde::{Deserialize, Serialize};\nuse std::{convert::Infallible, sync::Arc, time::{Duration, SystemTime, UNIX_EPOCH}};\nuse tokio::time::timeout;\nuse uuid::Uuid;\n\nuse super::chat_handler::Usage;\n\nconst REQUEST_TIMEOUT: Duration = Duration::from_secs(120);\n\n// Response structure for reasoning models\n#[derive(Deserialize, Debug)]\nstruct ReasoningResponse {\n    content: Vec\u003cReasoningContentBlock\u003e,\n    stop_reason: String,\n    usage: ReasoningUsage,\n}\n\n#[derive(Deserialize, Debug)]\nstruct ReasoningContentBlock {\n    #[serde(rename = \"type\")]\n    block_type: String,\n    #[serde(default)]\n    text: Option\u003cString\u003e,\n    #[serde(default)]\n    reasoning_content: Option\u003cReasoningText\u003e,\n}\n\n#[derive(Deserialize, Debug)]\nstruct ReasoningText {\n    reasoning_text: String,\n}\n\n#[derive(Deserialize, Debug)]\nstruct ReasoningUsage {\n    input_tokens: u32,\n    output_tokens: u32,\n    total_tokens: u32,\n}\n\n// Response builders\n#[derive(Serialize)]\nstruct ReasoningFullResponse {\n    id: String,\n    object: \u0026'static str,\n    created: u64,\n    model: String,\n    choices: [ReasoningChoice; 1],\n    usage: ReasoningUsageOutput,\n}\n\n#[derive(Serialize)]\nstruct ReasoningChoice {\n    index: u32,\n    message: ReasoningMessage,\n    finish_reason: \u0026'static str,\n}\n\n#[derive(Serialize)]\nstruct ReasoningMessage {\n    role: \u0026'static str,\n    content: Content,\n}\n\n#[derive(Serialize)]\nstruct ReasoningUsageOutput {\n    input_tokens: u32,\n    output_tokens: u32,\n    total_tokens: u32,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    completion_tokens: Option\u003cu32\u003e,\n}\n\npub async fn chat_with_reasoning_handler(\n    State(state): State\u003cAppState\u003e,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    reasoning_handler(state, auth, headers, Json(req)).await\n}\n\nasync fn reasoning_handler(\n    state: AppState,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    let temp_user_email = match auth {\n        Some(TypedHeader(Authorization(bearer))) =\u003e match state.auth.authenticate(bearer.token()) {\n            Ok(email) =\u003e email,\n            Err(_) =\u003e return StatusCode::FORBIDDEN.into_response(),\n        },\n        None =\u003e return (StatusCode::UNAUTHORIZED, \"Missing API Key\").into_response(),\n    };\n\n    let user_email = if temp_user_email == \"chat\" {\n        headers.get(\"x-openwebui-user-email\").and_then(|v| v.to_str().ok()).unwrap_or(\"anonymous\").to_string()\n    } else {\n        temp_user_email\n    };\n\n    let message_id = headers.get(\"x-openwebui-message-id\").and_then(|v| v.to_str().ok()).map(|s| s.to_owned()).unwrap_or_else(|| Uuid::new_v4().to_string());\n    let is_stream = req.stream.unwrap_or(true);\n    let client = Arc::new(state.client.clone());\n    let logger = Arc::new(state.logger.clone());\n\n    let include_reasoning = headers\n        .get(\"x-openwebui-reasoning\")\n        .and_then(|v| v.to_str().ok())\n        .map(|v| v == \"true\" || v == \"1\")\n        .unwrap_or(false);\n\n    if is_stream {\n        let s = stream_reasoning(client, req, logger, user_email, message_id, include_reasoning);\n        Sse::new(s).keep_alive(KeepAlive::default()).into_response()\n    } else {\n        non_stream_reasoning(client, req, logger, user_email, message_id, include_reasoning).await\n    }\n}\n\nasync fn non_stream_reasoning(\n    client: Arc\u003cRuntimeClient\u003e,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n    include_reasoning: bool,\n) -\u003e Response {\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let model_name = req.model.clone();\n    let start_time = tokio::time::Instant::now();\n\n    let payload = build_converse_payload(\u0026req);\n\n    let sdk_call = client\n        .converse()\n        .model_id(\u0026model_id)\n        .set_messages(Some(payload.messages))\n        .set_system(payload.system)\n        .inference_config(payload.inference_config)\n        .send();\n\n    let resp = match timeout(REQUEST_TIMEOUT, sdk_call).await {\n        Ok(Ok(output)) =\u003e output,\n        _ =\u003e return (StatusCode::BAD_GATEWAY, \"Bedrock Reasoning Error\").into_response(),\n    };\n\n    let p = resp.usage.as_ref().map(|u| u.input_tokens as u32).unwrap_or(0);\n    let c = resp.usage.as_ref().map(|u| u.output_tokens as u32).unwrap_or(0);\n\n    let mut response_text = String::new();\n    let mut reasoning_text = String::new();\n\n    if let Some(output) = resp.output {\n        if let OutputEnum::Message(msg) = output {\n            for block in msg.content {\n                match block {\n                    BContentBlock::Text(t) =\u003e response_text.push_str(\u0026t),\n                    BContentBlock::ReasoningContent(r) =\u003e {\n                        if let Ok(rt) = r.as_reasoning_text() {\n                            reasoning_text.push_str(\u0026rt.text);\n                        }\n                    }\n                    _ =\u003e {}\n                }\n            }\n        }\n    }\n\n    let _total_duration_ms = start_time.elapsed().as_millis() as u64;\n\n    spawn_log(logger, user_email, model_name.clone(), p, c);\n\n    let full_resp = if include_reasoning \u0026\u0026 !reasoning_text.is_empty() {\n        ReasoningFullResponse {\n            id: message_id,\n            object: \"chat.completion\",\n            created: SystemTime::now().duration_since(UNIX_EPOCH).unwrap_or_default().as_secs(),\n            model: model_name,\n            choices: [ReasoningChoice {\n                index: 0,\n                message: ReasoningMessage {\n                    role: \"assistant\",\n                    content: Content::Blocks(vec![\n                        ContentBlock {\n                            r#type: \"reasoning\".to_string(),\n                            text: None,\n                            thinking: Some(reasoning_text),\n                            signature: None,\n                            reasoning_content: None,\n                        },\n                        ContentBlock {\n                            r#type: \"text\".to_string(),\n                            text: Some(response_text),\n                            thinking: None,\n                            signature: None,\n                            reasoning_content: None,\n                        },\n                    ]),\n                },\n                finish_reason: \"stop\",\n            }],\n            usage: ReasoningUsageOutput {\n                input_tokens: p,\n                output_tokens: c,\n                total_tokens: p + c,\n                completion_tokens: Some(c),\n            },\n        }\n    } else {\n        ReasoningFullResponse {\n            id: message_id,\n            object: \"chat.completion\",\n            created: SystemTime::now().duration_since(UNIX_EPOCH).unwrap_or_default().as_secs(),\n            model: model_name,\n            choices: [ReasoningChoice {\n                index: 0,\n                message: ReasoningMessage {\n                    role: \"assistant\",\n                    content: Content::Text(response_text),\n                },\n                finish_reason: \"stop\",\n            }],\n            usage: ReasoningUsageOutput {\n                input_tokens: p,\n                output_tokens: c,\n                total_tokens: p + c,\n                completion_tokens: Some(c),\n            },\n        }\n    };\n\n    match serde_json::to_string(\u0026full_resp) {\n        Ok(json) =\u003e (StatusCode::OK, [(\"content-type\", \"application/json\")], json).into_response(),\n        Err(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR.into_response(),\n    }\n}\n\nfn stream_reasoning(\n    client: Arc\u003cRuntimeClient\u003e,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    _message_id: String,\n    _include_reasoning: bool,\n) -\u003e impl Stream\u003cItem = Result\u003cEvent, Infallible\u003e\u003e {\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let model_name = req.model.clone();\n    let start_time = tokio::time::Instant::now();\n    let request_id = _message_id;\n\n    let created = SystemTime::now().duration_since(UNIX_EPOCH).unwrap_or_default().as_secs();\n\n    let payload = build_converse_payload(\u0026req);\n\n    async_stream::stream! {\n        let sdk_call = client.converse_stream()\n            .model_id(\u0026model_id)\n            .set_messages(Some(payload.messages))\n            .set_system(payload.system)\n            .inference_config(payload.inference_config)\n            .send();\n\n        let mut resp = match timeout(REQUEST_TIMEOUT, sdk_call).await {\n            Ok(Ok(r)) =\u003e r,\n            _ =\u003e { yield Ok(Event::default().data(r#\"{\"error\":\"Reasoning stream failed\"}\"#)); return; }\n        };\n\n        let mut ttft_ms: Option\u003cu64\u003e = None;\n        let mut metrics = (0u32, 0u32);\n        let _reasoning_text = String::new();\n        let mut text_accumulated = String::new();\n\n        while let Ok(Some(event)) = resp.stream.recv().await {\n            match event {\n                aws_sdk_bedrockruntime::types::ConverseStreamOutput::ContentBlockDelta(delta) =\u003e {\n                    if ttft_ms.is_none() {\n                        ttft_ms = Some(start_time.elapsed().as_millis() as u64);\n                    }\n                    if let Some(ContentBlockDelta::Text(t)) = delta.delta {\n                        text_accumulated.push_str(\u0026t);\n\n                        let chunk = serde_json::json!({\n                            \"id\": request_id,\n                            \"object\": \"chat.completion.chunk\",\n                            \"created\": created,\n                            \"model\": model_name,\n                            \"choices\": [{\n                                \"index\": 0,\n                                \"delta\": { \"content\": t },\n                                \"finish_reason\": null\n                            }]\n                        });\n                        yield Ok(Event::default().data(serde_json::to_string(\u0026chunk).unwrap_or_default()));\n                    }\n                }\n                aws_sdk_bedrockruntime::types::ConverseStreamOutput::Metadata(m) =\u003e if let Some(u) = m.usage {\n                    metrics = (u.input_tokens as u32, u.output_tokens as u32);\n                }\n                aws_sdk_bedrockruntime::types::ConverseStreamOutput::MessageStop(stop) =\u003e {\n                    let chunk = serde_json::json!({\n                        \"id\": request_id,\n                        \"object\": \"chat.completion.chunk\",\n                        \"created\": created,\n                        \"model\": model_name,\n                        \"choices\": [{\n                            \"index\": 0,\n                            \"delta\": { \"content\": null },\n                            \"finish_reason\": format!(\"{:?}\", stop.stop_reason).to_lowercase()\n                        }]\n                    });\n                    yield Ok(Event::default().data(serde_json::to_string(\u0026chunk).unwrap_or_default()));\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let total_duration_ms = start_time.elapsed().as_millis() as u64;\n        let (p, c) = metrics;\n\n        if p \u003e 0 || c \u003e 0 {\n            let ttft = ttft_ms.unwrap_or(total_duration_ms);\n            let gen_time_sec = (total_duration_ms.saturating_sub(ttft) as f64) / 1000.0;\n            let tps = if gen_time_sec \u003e 0.0 { c as f64 / gen_time_sec } else { 0.0 };\n\n            let usage_chunk = serde_json::json!({\n                \"id\": request_id,\n                \"object\": \"chat.completion.chunk\",\n                \"created\": created,\n                \"model\": model_name,\n                \"choices\": [],\n                \"usage\": {\n                    \"input_tokens\": p,\n                    \"output_tokens\": c,\n                    \"total_tokens\": p + c,\n                    \"completion_tokens\": c,\n                    \"ttft_ms\": ttft,\n                    \"latency_ms\": total_duration_ms,\n                    \"tokens_per_second\": (tps * 100.0).round() / 100.0\n                }\n            });\n            yield Ok(Event::default().data(serde_json::to_string(\u0026usage_chunk).unwrap_or_default()));\n            spawn_log(logger, user_email, model_name, p, c);\n        }\n\n        yield Ok(Event::default().data(\"[DONE]\"));\n    }\n}\n\nfn spawn_log(logger: Arc\u003cClickHouseLogger\u003e, email: String, model: String, p: u32, c: u32) {\n    tokio::spawn(async move {\n        let _ = logger.log_usage(\u0026email, \u0026model, p, c);\n    });\n}\n","traces":[{"line":93,"address":[21900896],"length":1,"stats":{"Line":0}},{"line":99,"address":[22306489,22306562,22306724,22306632],"length":1 authorization::Bearer, Authorization},\n    TypedHeader,\n};\nuse futures_util::Stream;\nuse serde::Serialize;\nuse std::{convert::Infallible, sync::Arc, time::{Duration, SystemTime, UNIX_EPOCH}};\nuse tokio::time::timeout;\nuse uuid::Uuid;\n\nuse super::chat_handler::Usage;\n\nconst REQUEST_TIMEOUT: Duration = Duration::from_secs(300);\n\n// Response builders\n#[derive(Serialize)]\nstruct ThinkingFullResponse {\n    id: String,\n    object: \u0026'static str,\n    created: u64,\n    model: String,\n    choices: [ThinkingChoice; 1],\n    usage: Usage,\n}\n\n#[derive(Serialize)]\nstruct ThinkingChoice {\n    index: u32,\n    message: ThinkingMessageResponse,\n    finish_reason: \u0026'static str,\n}\n\n#[derive(Serialize)]\nstruct ThinkingMessageResponse {\n    role: \u0026'static str,\n    content: Content,\n}\n\npub async fn chat_with_thinking_handler(\n    State(state): State\u003cAppState\u003e,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    let model_id = req.model.clone();\n\n    // Check if model supports reasoning (DeepSeek R1)\n    if model_supports_reasoning(\u0026model_id) {\n        return chat_with_reasoning_handler(State(state), auth, headers, Json(req)).await;\n    }\n\n    // Check if model supports thinking (Claude extended thinking)\n    if !model_supports_thinking(\u0026model_id) {\n        return chat_handler(State(state), auth, headers, Json(req)).await;\n    }\n\n    let thinking_enabled = headers\n        .get(\"x-openwebui-thinking\")\n        .and_then(|v| v.to_str().ok())\n        .map(|v| v == \"true\" || v == \"1\")\n        .unwrap_or(false);\n\n    let enabled = req.thinking.as_ref()\n        .map(|t| t.enabled.unwrap_or(false))\n        .unwrap_or(false);\n\n    if !thinking_enabled \u0026\u0026 !enabled {\n        return chat_handler(State(state), auth, headers, Json(req)).await;\n    }\n\n    thinking_handler(state, auth, headers, Json(req)).await\n}\n\nfn model_supports_thinking(model_id: \u0026str) -\u003e bool {\n    get_model_capabilities(model_id)\n        .map(|c| c.supports_thinking)\n        .unwrap_or(false)\n}\n\nfn model_supports_reasoning(model_id: \u0026str) -\u003e bool {\n    get_model_capabilities(model_id)\n        .map(|c| c.supports_reasoning)\n        .unwrap_or(false)\n}\n\nasync fn thinking_handler(\n    state: AppState,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    let temp_user_email = match auth {\n        Some(TypedHeader(Authorization(bearer))) =\u003e match state.auth.authenticate(bearer.token()) {\n            Ok(email) =\u003e email,\n            Err(_) =\u003e return StatusCode::FORBIDDEN.into_response(),\n        },\n        None =\u003e return (StatusCode::UNAUTHORIZED, \"Missing API Key\").into_response(),\n    };\n\n    let user_email = if temp_user_email == \"chat\" {\n        headers.get(\"x-openwebui-user-email\").and_then(|v| v.to_str().ok()).unwrap_or(\"anonymous\").to_string()\n    } else {\n        temp_user_email\n    };\n\n    let message_id = headers.get(\"x-openwebui-message-id\").and_then(|v| v.to_str().ok()).map(|s| s.to_owned()).unwrap_or_else(|| Uuid::new_v4().to_string());\n    let is_stream = req.stream.unwrap_or(true);\n    let client = Arc::new(state.client.clone());\n    let logger = Arc::new(state.logger.clone());\n\n    if is_stream {\n        let s = non_stream_as_stream(client, req, logger, user_email, message_id);\n        Sse::new(s).keep_alive(KeepAlive::default()).into_response()\n    } else {\n        non_stream_thinking(client, req, logger, user_email, message_id).await\n    }\n}\n\nasync fn non_stream_thinking(\n    client: Arc\u003cRuntimeClient\u003e,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e Response {\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let start_time = tokio::time::Instant::now();\n\n    let (max_tokens, budget_tokens) = parse_thinking_params(\u0026req);\n    let body = build_thinking_request(\u0026req, max_tokens, budget_tokens);\n\n    let resp = match invoke_thinking_model(\u0026client, \u0026model_id, \u0026body).await {\n        Ok(r) =\u003e r,\n        Err(_) =\u003e return (StatusCode::BAD_GATEWAY, \"Bedrock Thinking Error\").into_response(),\n    };\n\n    let mut thinking_text = String::new();\n    let mut response_text = String::new();\n\n    for block in \u0026resp.content {\n        match block.r#type.as_str() {\n            \"thinking\" =\u003e if let Some(t) = \u0026block.thinking { thinking_text.push_str(t); },\n            \"text\" =\u003e if let Some(t) = \u0026block.text { response_text.push_str(t); },\n            _ =\u003e {}\n        }\n    }\n\n    let total_duration_ms = start_time.elapsed().as_millis() as u64;\n    let model_name = req.model.clone();\n\n    let usage = Usage {\n        input_tokens: resp.usage.input_tokens,\n        output_tokens: resp.usage.output_tokens,\n        total_tokens: resp.usage.total_tokens,\n        ttft_ms: Some(total_duration_ms),\n        latency_ms: Some(total_duration_ms),\n        tokens_per_second: None,\n    };\n\n    spawn_log(logger, user_email, model_name.clone(), resp.usage.input_tokens, resp.usage.output_tokens);\n\n    let full_resp = ThinkingFullResponse {\n        id: message_id,\n        object: \"chat.completion\",\n        created: SystemTime::now().duration_since(UNIX_EPOCH).unwrap_or_default().as_secs(),\n        model: model_name,\n        choices: [ThinkingChoice {\n            index: 0,\n            message: ThinkingMessageResponse {\n                role: \"assistant\",\n                content: Content::Blocks(vec![\n                    ContentBlock { r#type: \"thinking\".to_string(), text: None, thinking: Some(thinking_text), signature: None, reasoning_content: None },\n                    ContentBlock { r#type: \"text\".to_string(), text: Some(response_text), thinking: None, signature: None, reasoning_content: None },\n                ]),\n            },\n            finish_reason: \"stop\",\n        }],\n        usage,\n    };\n\n    match serde_json::to_string(\u0026full_resp) {\n        Ok(json) =\u003e (StatusCode::OK, [(\"content-type\", \"application/json\")], json).into_response(),\n        Err(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR.into_response(),\n    }\n}\n\nfn non_stream_as_stream(\n    client: Arc\u003cRuntimeClient\u003e,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e impl Stream\u003cItem = Result\u003cEvent, Infallible\u003e\u003e {\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let model_name = req.model.clone();\n\n    let (max_tokens, budget_tokens) = parse_thinking_params(\u0026req);\n\n    async_stream::stream! {\n        yield Ok(Event::default().data(r#\"{\"type\":\"content_block_start\",\"index\":0,\"content_block\":{\"type\":\"thinking\",\"thinking\":\"\"}}\"#));\n\n        let body = build_thinking_request(\u0026req, max_tokens, budget_tokens);\n        let resp = match invoke_thinking_model(\u0026client, \u0026model_id, \u0026body).await {\n            Ok(r) =\u003e r,\n            Err(_) =\u003e { yield Ok(Event::default().data(r#\"{\"error\":\"Thinking stream failed\"}\"#)); return; }\n        };\n\n        let mut thinking_text = String::new();\n        let mut response_text = String::new();\n\n        for block in \u0026resp.content {\n            match block.r#type.as_str() {\n                \"thinking\" =\u003e if let Some(t) = \u0026block.thinking { thinking_text.push_str(t); },\n                \"text\" =\u003e if let Some(t) = \u0026block.text { response_text.push_str(t); },\n                _ =\u003e {}\n            }\n        }\     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
