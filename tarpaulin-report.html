red":0,"coverable":0},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","infrastructure","persistence","mod.rs"],"content":"//! Persistence infrastructure - SQLite and ClickHouse\n//!\n//! Auth and logging are handled in the domain layer.\n//! This module is reserved for future persistence needs.\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","interface","chat","chat_handler.rs"],"content":"//! Standard chat handler using Converse API\n\nuse crate::domain::chat::{get_model_capabilities, ChatRequest, Content};\nuse crate::domain::logging::ClickHouseLogger;\nuse crate::infrastructure::bedrock::converse::build_converse_payload;\nuse crate::infrastructure::cloudflare::CloudflareClient;\nuse crate::shared::app_state::AppState;\n\nuse aws_sdk_bedrockruntime::{\n    types::{\n        ContentBlock, ContentBlockDelta, ConverseOutput as OutputEnum,\n        ConverseStreamOutput as Out,\n    },\n    Client as RuntimeClient,\n};\nuse axum::{\n    extract::State,\n    http::{HeaderMap, StatusCode},\n    response::{\n        sse::{Event, KeepAlive, Sse},\n        IntoResponse, Response,\n    },\n    Json,\n};\nuse axum_extra::{\n    headers::{authorization::Bearer, Authorization},\n    TypedHeader,\n};\nuse futures_util::{Stream, StreamExt};\nuse serde::Serialize;\nuse std::{\n    convert::Infallible,\n    sync::Arc,\n    time::{Duration, SystemTime, UNIX_EPOCH},\n};\nuse tokio::time::timeout;\nuse uuid::Uuid;\n\nconst REQUEST_TIMEOUT: Duration = Duration::from_secs(60);\n\n/// Normalize model name to show provider clearly in responses\nfn normalize_model_name(model: \u0026str) -\u003e String {\n    if model.starts_with(\"@cf/\") {\n        model.replacen(\"@cf/\", \"cloudflare/\", 1)\n    } else {\n        model.replace(\"bedrock/\", \"aws/bedrock/\")\n    }\n}\n\n// Non-Stream Response Structure\n#[derive(Serialize)]\nstruct FullResponse\u003c'a\u003e {\n    id: \u0026'a str,\n    object: \u0026'static str,\n    created: u64,\n    model: \u0026'a str,\n    choices: [FullChoice\u003c'a\u003e; 1],\n    usage: Usage,\n}\n\n#[derive(Serialize)]\nstruct FullChoice\u003c'a\u003e {\n    index: u32,\n    message: FullMessage\u003c'a\u003e,\n    finish_reason: \u0026'static str,\n}\n\n#[derive(Serialize)]\nstruct FullMessage\u003c'a\u003e {\n    role: \u0026'static str,\n    content: \u0026'a str,\n}\n\n#[derive(Serialize)]\npub struct Usage {\n    pub input_tokens: u32,\n    pub output_tokens: u32,\n    pub total_tokens: u32,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub ttft_ms: Option\u003cu64\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub latency_ms: Option\u003cu64\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub tokens_per_second: Option\u003cf64\u003e,\n}\n\n#[derive(Serialize)]\npub struct ChatChunk\u003c'a\u003e {\n    pub id: \u0026'a str,\n    pub object: \u0026'static str,\n    pub created: u64,\n    pub model: \u0026'a str,\n    pub choices: \u0026'a [ChunkChoice\u003c'a\u003e],\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub usage: Option\u003cUsage\u003e,\n}\n\n#[derive(Serialize)]\npub struct ChunkChoice\u003c'a\u003e {\n    pub index: u32,\n    pub delta: ChunkDelta\u003c'a\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub finish_reason: Option\u003cString\u003e,\n}\n\n#[derive(Serialize)]\npub struct ChunkDelta\u003c'a\u003e {\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub content: Option\u003c\u0026'a str\u003e,\n}\n\npub async fn chat_handler(\n    State(state): State\u003cAppState\u003e,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    let temp_user_email = match auth {\n        Some(TypedHeader(Authorization(bearer))) =\u003e match state.auth.authenticate(bearer.token()) {\n            Ok(email) =\u003e email,\n            Err(_) =\u003e return StatusCode::FORBIDDEN.into_response(),\n        },\n        None =\u003e return (StatusCode::UNAUTHORIZED, \"Missing API Key\").into_response(),\n    };\n\n    let user_email = if temp_user_email == \"chat\" {\n        headers\n            .get(\"x-openwebui-user-email\")\n            .and_then(|v| v.to_str().ok())\n            .unwrap_or(\"anonymous\")\n            .to_string()\n    } else {\n        temp_user_email\n    };\n\n    let message_id = headers\n        .get(\"x-openwebui-message-id\")\n        .and_then(|v| v.to_str().ok())\n        .map(|s| s.to_owned())\n        .unwrap_or_else(|| Uuid::new_v4().to_string());\n\n    let is_stream = req.stream.unwrap_or(true);\n\n    // Check if this is a Cloudflare model\n    let is_cloudflare = req.model.starts_with(\"@cf/\");\n\n    // Normalize model_name to show provider clearly\n    let model_name = normalize_model_name(\u0026req.model);\n\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let client = Arc::new(state.client.clone());\n    let logger = Arc::new(state.logger.clone());\n    let cloudflare_client = state.cloudflare_client.clone();\n\n    if is_cloudflare {\n        if let Some(cf_client) = cloudflare_client {\n            if is_stream {\n                let s = stream_cloudflare(cf_client, model_id, model_name, req, logger, user_email, message_id);\n                return Sse::new(s).keep_alive(KeepAlive::default()).into_response();\n            } else {\n                return non_stream_cloudflare(cf_client, model_id, model_name, req, logger, user_email, message_id).await;\n            }\n        } else {\n            return (StatusCode::SERVICE_UNAVAILABLE, \"Cloudflare client not configured\").into_response();\n        }\n    }\n\n    if is_stream {\n        let s = stream_converse(client, model_id, model_name, req, logger, user_email, message_id);\n        Sse::new(s).keep_alive(KeepAlive::default()).into_response()\n    } else {\n        non_stream(client, model_id, model_name, req, logger, user_email, message_id).await\n    }\n}\n\nfn stream_converse(\n    client: Arc\u003cRuntimeClient\u003e,\n    model_id: String,\n    model_name: String,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e impl Stream\u003cItem = Result\u003cEvent, Infallible\u003e\u003e {\n    let start_time = tokio::time::Instant::now();\n    let mut ttft_ms: Option\u003cu64\u003e = None;\n    let request_id = message_id;\n    let created = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_secs();\n\n    let payload = build_converse_payload(\u0026req);\n\n    async_stream::stream! {\n        let sdk_call = client.converse_stream()\n            .model_id(\u0026model_id)\n            .set_messages(Some(payload.messages))\n            .set_system(payload.system)\n            .inference_config(payload.inference_config)\n            .send();\n\n        let mut resp = match timeout(REQUEST_TIMEOUT, sdk_call).await {\n            Ok(Ok(r)) =\u003e r,\n            _ =\u003e { yield Ok(Event::default().data(r#\"{\"error\":\"Stream failed\"}\"#)); return; }\n        };\n\n        let mut metrics = (0u32, 0u32);\n\n        while let Ok(Some(event)) = resp.stream.recv().await {\n            match event {\n                Out::ContentBlockDelta(delta) =\u003e {\n                    if ttft_ms.is_none() {\n                        ttft_ms = Some(start_time.elapsed().as_millis() as u64);\n                    }\n                    if let Some(ContentBlockDelta::Text(t)) = delta.delta {\n                        let choices = [\n                            ChunkChoice {\n                                index: 0,\n                                delta: ChunkDelta {\n                                    content: Some(\u0026t)\n                                },\n                                finish_reason: None\n                            }];\n                        let chunk = ChatChunk {\n                            id: \u0026request_id,\n                            object: \"chat.completion.chunk\",\n                            created,\n                            model: \u0026model_name,\n                            choices: \u0026choices,\n                            usage: None\n                        };\n                        if let Ok(j) = serde_json::to_string(\u0026chunk) {\n                            yield Ok(Event::default().data(j));\n                        }\n                    }\n                }\n                Out::Metadata(m) =\u003e if let Some(u) = m.usage {\n                    metrics = (\n                        u.input_tokens as u32,\n                        u.output_tokens as u32\n                    );\n                }\n                Out::MessageStop(stop) =\u003e {\n                    let choices = [\n                        ChunkChoice {\n                            index: 0,\n                            delta: ChunkDelta {\n                                content: None\n                            },\n                            finish_reason: Some(\n                                format!(\"{:?}\", stop.stop_reason).to_lowercase()\n                            )\n                        }];\n                    let chunk = ChatChunk {\n                        id: \u0026request_id,\n                        object: \"chat.completion.chunk\",\n                        created,\n                        model: \u0026model_name,\n                        choices: \u0026choices,\n                        usage: None\n                    };\n                    if let Ok(j) = serde_json::to_string(\u0026chunk) {\n                        yield Ok(Event::default().data(j));\n                    }\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let total_duration_ms = start_time.elapsed().as_millis() as u64;\n        let (p, c) = metrics;\n\n        if p \u003e 0 || c \u003e 0 {\n            let ttft = ttft_ms.unwrap_or(total_duration_ms);\n            let gen_time_sec = (total_duration_ms.saturating_sub(ttft) as f64) / 1000.0;\n            let tps = if gen_time_sec \u003e 0.0 { c as f64 / gen_time_sec } else { 0.0 };\n\n            let usage_chunk = ChatChunk {\n                id: \u0026request_id,\n                object: \"chat.completion.chunk\",\n                created,\n                model: \u0026model_name,\n                choices: \u0026[],\n                usage: Some(Usage {\n                    input_tokens: p,\n                    output_tokens: c,\n                    total_tokens: p + c,\n                    ttft_ms: Some(ttft),\n                    latency_ms: Some(total_duration_ms),\n                    tokens_per_second: Some((tps * 100.0).round() / 100.0),\n                })\n            };\n            if let Ok(j) = serde_json::to_string(\u0026usage_chunk) {\n                yield Ok(Event::default().data(j));\n            }\n            spawn_log(logger, user_email, model_name, p, c);\n        }\n        yield Ok(Event::default().data(\"[DONE]\"));\n    }\n}\n\nasync fn non_stream(\n    client: Arc\u003cRuntimeClient\u003e,\n    model_id: String,\n    model_name: String,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e Response {\n    let start_time = tokio::time::Instant::now();\n    let payload = build_converse_payload(\u0026req);\n\n    let sdk_call = client\n        .converse()\n        .model_id(\u0026model_id)\n        .set_messages(Some(payload.messages))\n        .set_system(payload.system)\n        .inference_config(payload.inference_config)\n        .send();\n\n    let resp = match timeout(REQUEST_TIMEOUT, sdk_call).await {\n        Ok(Ok(output)) =\u003e output,\n        _ =\u003e return (StatusCode::BAD_GATEWAY, \"Bedrock Error\").into_response(),\n    };\n\n    let p = resp\n        .usage\n        .as_ref()\n        .map(|u| u.input_tokens as u32)\n        .unwrap_or(0);\n    let c = resp\n        .usage\n        .as_ref()\n        .map(|u| u.output_tokens as u32)\n        .unwrap_or(0);\n\n    let content = resp\n        .output\n        .and_then(|o| match o {\n            OutputEnum::Message(m) =\u003e Some(m),\n            _ =\u003e None,\n        })\n        .and_then(|m| m.content.into_iter().next())\n        .and_then(|cb| match cb {\n            ContentBlock::Text(t) =\u003e Some(t),\n            _ =\u003e None,\n        })\n        .unwrap_or_default();\n\n    spawn_log(logger, user_email, model_name.clone(), p, c);\n\n    let request_id = message_id;\n    let total_duration_ms = start_time.elapsed().as_millis() as u64;\n\n    let (p, c) = (\n        resp.usage\n            .as_ref()\n            .map(|u| u.input_tokens as u32)\n            .unwrap_or(0),\n        resp.usage\n            .as_ref()\n            .map(|u| u.output_tokens as u32)\n            .unwrap_or(0),\n    );\n\n    let tps = if total_duration_ms \u003e 0 {\n        (c as f64) / (total_duration_ms as f64 / 1000.0)\n    } else {\n        0.0\n    };\n\n    let full_resp = FullResponse {\n        id: \u0026request_id,\n        object: \"chat.completion\",\n        created: SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_secs(),\n        model: \u0026model_name,\n        choices: [FullChoice {\n            index: 0,\n            message: FullMessage {\n                role: \"assistant\",\n                content: \u0026content,\n            },\n            finish_reason: \"stop\",\n        }],\n        usage: Usage {\n            input_tokens: p,\n            output_tokens: c,\n            total_tokens: p + c,\n            ttft_ms: Some(total_duration_ms),\n            latency_ms: Some(total_duration_ms),\n            tokens_per_second: Some((tps * 100.0).round() / 100.0),\n        },\n    };\n\n    match serde_json::to_string(\u0026full_resp) {\n        Ok(json) =\u003e (StatusCode::OK, [(\"content-type\", \"application/json\")], json).into_response(),\n        Err(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR.into_response(),\n    }\n}\n\nfn spawn_log(logger: Arc\u003cClickHouseLogger\u003e, email: String, model: String, p: u32, c: u32) {\n    tokio::spawn(async move {\n        let _ = logger.log_usage(\u0026email, \u0026model, p, c);\n    });\n}\n\n// =============================================================================\n// Cloudflare Workers AI handlers\n// =============================================================================\n\nfn stream_cloudflare(\n    client: CloudflareClient,\n    model_id: String,\n    model_name: String,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e impl Stream\u003cItem = Result\u003cEvent, Infallible\u003e\u003e {\n    let start_time = tokio::time::Instant::now();\n    let mut ttft_ms: Option\u003cu64\u003e = None;\n    let request_id = message_id;\n    let created = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_secs();\n\n    async_stream::stream! {\n        let cf_resp = match client.chat_streaming(req).await {\n            Ok(r) =\u003e r,\n            Err(e) =\u003e {\n                yield Ok(Event::default().data(format!(r#\"{{\"error\":\"{}\"}}\"#, e)));\n                return;\n            }\n        };\n\n        let mut stream = cf_resp;\n        while let Some(chunk_result) = stream.next().await {\n            match chunk_result {\n                Ok(chunk) =\u003e {\n                    if ttft_ms.is_none() {\n                        ttft_ms = Some(start_time.elapsed().as_millis() as u64);\n                    }\n                    // Cloudflare returns SSE-like format, pass through\n                    yield t\"\n        );\n        assert_eq!(\n            normalize_model_name(\"@cf/deepseek-ai/deepseek-r1\"),\n            \"cloudflare/deepseek-ai/deepseek-r1\"\n        );\n        assert_eq!(\n            normalize_model_name(\"@cf/google/gemma-2-2b-it\"),\n            \"cloudflare/google/gemma-2-2b-it\"\n        );\n    }\n\n    #[test]\n    fn test_normalize_model_name_bedrock() {\n        assert_eq!(\n            normalize_model_name(\"bedrock/anthropic.claude-3-5-sonnet-v1:0\"),\n            \"aws/bedrock/anthropic.claude-3-5-sonnet-v1:0\"\n        );\n        assert_eq!(\n            normalize_model_name(\"bedrock/deepseek.r1-v1:0\"),\n            \"aws/bedrock/deepseek.r1-v1:0\"\n        );\n    }\n\n    #[test]\n    fn test_normalize_model_name_no_prefix() {\n        // Models without bedrock/ prefix stay as-is\n        assert_eq!(\n            normalize_model_name(\"anthropic.claude-3-5-sonnet-v1:0\"),\n            \"anthropic.claude-3-5-sonnet-v1:0\"\n        );\n        assert_eq!(\n            normalize_model_name(\"deepseek.r1-v1:0\"),\n            \"deepseek.r1-v1:0\"\n        );\n    }\n\n    #[test]\n    fn test_normalize_model_name_multiple_bedrock() {\n        // replace() replaces ALL occurrences, not just the first one\n        assert_eq!(\n            normalize_model_name(\"bedrock/bedrock/anthropic.claude\"),\n            \"aws/bedrock/aws/bedrock/anthropic.claude\"\n        );\n    }\n\n    #[test]\n    fn test_normalize_model_name_empty() {\n        assert_eq!(normalize_model_name(\"\"), \"\");\n    }\n\n    #[test]\n    fn test_usage_serialization() {\n        let usage = Usage {\n            input_tokens: 100,\n            output_tokens: 200,\n            total_tokens: 300,\n            ttft_ms: Some(50),\n            latency_ms: Some(150),\n            tokens_per_second: Some(133.33),\n        };\n\n        let json = serde_json::to_string(\u0026usage).unwrap();\n        assert!(json.contains(\"\\\"input_tokens\\\":100\"));\n        assert!(j tion\u003cReasoningText\u003e,\n}\n\n#[derive(Deserialize, Debug)]\nstruct ReasoningText {\n    reasoning_text: String,\n}\n\n#[derive(Deserialize, Debug)]\nstruct ReasoningUsage {\n    input_tokens: u32,\n    output_tokens: u32,\n    total_tokens: u32,\n}\n\n// Response builders\n#[derive(Serialize)]\nstruct ReasoningFullResponse {\n    id: String,\n    object: \u0026'static str,\n    created: u64,\n    model: String,\n    choices: [ReasoningChoice; 1],\n    usage: ReasoningUsageOutput,\n}\n\n#[derive(Serialize)]\nstruct ReasoningChoice {\n    index: u32,\n    message: ReasoningMessage,\n    finish_reason: \u0026'static str,\n}\n\n#[derive(Serialize)]\nstruct ReasoningMessage {\n    role: \u0026'static str,\n    content: Content,\n}\n\n#[derive(Serialize)]\nstruct ReasoningUsageOutput {\n    input_tokens: u32,\n    output_tokens: u32,\n    total_tokens: u32,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    completion_tokens: Option\u003cu32\u003e,\n}\n\npub async fn chat_with_reasoning_handler(\n    State(state): State\u003cAppState\u003e,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    reasoning_handler(state, auth, headers, Json(req)).await\n}\n\nasync fn reasoning_handler(\n    state: AppState,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    let temp_user_email = match auth {\n        Some(TypedHeader(Authorization(bearer))) =\u003e match state.auth.authenticate(bearer.token()) {\n            Ok(email) =\u003e email,\n            Err(_) =\u003e return StatusCode::FORBIDDEN.into_response(),\n        },\n        None =\u003e return (StatusCode::UNAUTHORIZED, \"Missing API Key\").into_response(),\n    };\n\n    let user_email = if temp_user_email == \"chat\" {\n        headers.get(\"x-openwebui-user-email\").and_then(|v| v.to_str().ok()).unwrap_or(\"anonymous\").to_string()\n    } else {\n        temp_user_email\n    };\n\n    let message_id = headers.get(\"x-openwebui-message-id\").and_then(|v| v.to_str().ok()).map(|s| s.to_owned()).unwrap_or_else(|| Uuid::new_v4().to_string());\n    let is_stream = req.stream.unwrap_or(true);\n    let client = Arc::new(state.client.clone());\n    let logger = Arc::new(state.logger.clone());\n\n    let include_reasoning = headers\n        .get(\"x-openwebui-reasoning\")\n        .and_then(|v| v.to_str().ok())\n        .map(|v| v == \"true\" || v == \"1\")\n        .unwrap_or(false);\n\n    if is_stream {\n        let s = stream_reasoning(client, req, logger, user_email, message_id, include_reasoning);\n        Sse::new(s).keep_alive(KeepAlive::default()).into_response()\n    } else {\n        non_stream_reasoning(client, req, logger, user_email, message_id, include_reasoning).await\n    }\n}\n\nasync fn non_stream_reasoning(\n    client: Arc\u003cRuntimeClient\u003e,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n    include_reasoning: bool,\n) -\u003e Response {\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let model_name = req.model.clone();\n    let start_time = tokio::time::Instant::now();\n\n    let payload = build_converse_payload(\u0026req);\n\n    let sdk_call = client\n        .converse()\n        .model_id(\u0026model_id)\n        .set_messages(Some(payload.messages))\n        .set_system(payload.system)\n        .inference_config(payload.inference_config)\n        .send();\n\n    let resp = match timeout(REQUEST_TIMEOUT, sdk_call).await {\n        Ok(Ok(output)) =\u003e output,\n        _ =\u003e return (StatusCode::BAD_GATEWAY, \"Bedrock Reasoning Error\").into_response(),\n    };\n\n    let p = resp.usage.as_ref().map(|u| u.input_tokens as u32).unwrap_or(0);\n    let c = resp.usage.as_ref().map(|u| u.output_tokens as u32).unwrap_or(0);\n\n    let mut response_text = String::new();\n    let mut reasoning_text = String::new();\n\n    if let Some(output) = resp.output {\n        if let OutputEnum::Message(msg) = output {\n            for block in msg.content {\n                match block {\n                    BContentBlock::Text(t) =\u003e response_text.push_str(\u0026t),\n                    BContentBlock::ReasoningContent(r) =\u003e {\n                        if let Ok(rt) = r.as_reasoning_text() {\n                            reasoning_text.push_str(\u0026rt.text);\n                        }\n                    }\n                    _ =\u003e {}\n                }\n            }\n        }\n    }\n\n    let _total_duration_ms = start_time.elapsed().as_millis() as u64;\n\n    spawn_log(logger, user_email, model_name.clone(), p, c);\n\n    let full_resp = if include_reasoning \u0026\u0026 !reasoning_text.is_empty() {\n        ReasoningFullResponse {\n            id: message_id,\n            object: \"chat.completion\",\n            created: SystemTime::now().duration_since(UNIX_EPOCH).unwrap_or_default().as_secs(),\n            model: model_name,\n            choices: [ReasoningChoice {\n                index: 0,\n                message: ReasoningMessage {\n                    role: \"assistant\",\n                    content: Content::Blocks(vec![\n                        ContentBlock {\n                            r#type: \"reasoning\".to_string(),\n                            text: None,\n                            thinking: Some(reasoning_text),\n                            signature: None,\n                            reasoning_content: None,\n                        },\n                        ContentBlock {\n                            r#type: \"text\".to_string(),\n                            text: Some(response_text),\n                            thinking: None,\n                            signature: None,\n                            reasoning_content: None,\n                        },\n                    ]),\n                },\n                finish_reason: \"stop\",\n            }],\n            usage: ReasoningUsageOutput {\n                input_tokens: p,\n                output_tokens: c,\n                total_tokens: p + c,\n                completion_tokens: Some(c),\n            },\n        }\n    } else {\n        ReasoningFullResponse {\n            id: message_id,\n            object: \"chat.completion\",\n            created: SystemTime::now().duration_since(UNIX_EPOCH).unwrap_or_default().as_secs(),\n            model: model_name,\n            choices: [ReasoningChoice {\n                index: 0,\n                message: ReasoningMessage {\n                    role: \"assistant\",\n                    content: Content::Text(response_text),\n                },\n                finish_reason: \"stop\",\n            }],\n            usage: ReasoningUsageOutput {\n                input_tokens: p,\n                output_tokens: c,\n                total_tokens: p + c,\n                completion_tokens: Some(c),\n            },\n        }\n    };\n\n    match serde_json::to_string(\u0026full_resp) {\n        Ok(json) =\u003e (StatusCode::OK, [(\"content-type\", \"application/json\")], json).into_response(),\n        Err(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR.into_response(),\n    }\n}\n\nfn stream_reasoning(\n    client: Arc\u003cRuntimeClient\u003e,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    _message_id: String,\n    _include_reasoning: bool,\n) -\u003e impl Stream\u003cItem = Result\u003cEvent, Infallible\u003e\u003e {\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let model_name = req.model.clone();\n    let start_time = tokio::time::Instant::now();\n    let request_id = _message_id;\n\n    let created = SystemTime::now().duration_since(UNIX_EPOCH).unwrap_or_default().as_secs();\n\n    let payload = build_converse_payload(\u0026req);\n\n    async_stream::stream! {\n        let sdk_call = client.converse_stream()\n            .model_id(\u0026model_id)\n            .set_messages(Some(payload.messages))\n            .set_system(payload.system)\n            .inference_config(payload.inference_config)\n            .send();\n\n        let mut resp = match timeout(REQUEST_TIMEOUT, sdk_call).await {\n            Ok(Ok(r)) =\u003e r,\n            _ =\u003e { yield Ok(Event::default().data(r#\"{\"error\":\"Reasoning stream failed\"}\"#)); return; }\n        };\n\n        let mut ttft_ms: Option\u003cu64\u003e = None;\n        let mut metrics = (0u32, 0u32);\n        let _reasoning_text = String::new();\n        let mut text_accumulated = String::new();\n\n        while let Ok(Some(event)) = resp.stream.recv().await {\n            match event {\n                aws_sdk_bedrockruntime::types::ConverseStreamOutput::ContentBlockDelta(delta) =\u003e {\n                    if ttft_ms.is_none() {\n                        ttft_ms = Some(start_time.elapsed().as_millis() as u64);\n                    }\n                    if let Some(ContentBlockDelta::Text(t)) = delta.delta {\n                        text_accumulated.push_str(\u0026t);\n\n                        let chunk = serde_json::json!({\n                            \"id\": request_id,\n                            \"object\": \"chat.completion.chunk\",\n                            \"created\": created,\n                            \"model\": model_name,\n                            \"choices\": [{\n                                \"index\": 0,\n                                \"delta\": { \"content\": t },\n                                \"finish_reason\": null\n                            }]\n                        });\n                        yield Ok(Event::default().data(serde_json::to_string(\u0026chunk).unwrap_or_default()));\n                    }\n                }\n                aws_sdk_bedrockruntime::types::ConverseStreamOutput::Metadata(m) =\u003e if let Some(u) = m.usage {\n                    metrics = (u.input_tokens as u32, u.output_tokens as u32);\n                }\n                aws_sdk_bedrockruntime::types::ConverseStreamOutput::MessageStop(stop) =\u003e {\n                    let chunk = serde_json::json!({\n                        \"id\": request_id,\n                        \"object\": \"chat.completion.chunk\",\n                        \"created\": created,\n                        \"model\": model_name,\n                        \"choices\": [{\n                            \"index\": 0,\n                            \"delta\": { \"content\": null },\n                            \"finish_reason\": format!(\"{:?}\", stop.stop_reason).to_lowercase()\n                        }]\n                    });\n                    yield Ok(Event::default().data(serde_json::to_string(\u0026chunk).unwrap_or_default()));\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let total_duration_ms = start_time.elapsed().as_millis() as u64;\n        let (p, c) = metrics;\n\n        if p \u003e 0 || c \u003e 0 {\n            let ttft = ttft_ms.unwrap_or(total_duration_ms);\n            let gen_time_sec = (total_duration_ms.saturating_sub(ttft) as f64) / 1000.0;\n            let tps = if gen_time_sec \u003e 0.0 { c as f64 / gen_time_sec } else { 0.0 };\n\n            let usage_chunk = serde_json::json!({\n                \"id\": request_id,\n                \"object\": \"chat.completion.chunk\",\n                \"created\": created,\n                \"model\": model_name,\n                \"choices\": [],\n                \"usage\": {\n                    \"input_tokens\": p,\n                    \"output_tokens\": c,\n                    \"total_tokens\": p + c,\n                    \"completion_tokens\": c,\n                    \"ttft_ms\": ttft,\n                    \"latency_ms\": total_duration_ms,\n                    \"tokens_per_second\": (tps * 100.0).round() / 100.0\n                }\n            });\n            yield Ok(Event::default().data(serde_json::to_string(\u0026usage_chunk).unwrap_or_default()));\n            spawn_log(logger, user_email, model_name, p, c);\n        }\n\n        yield Ok(Event::default().data(\"[DONE]\"));\n    }\n}\n\nfn spawn_log(logger: Arc\u003cClickHouseLogger\u003e, email: String, model: String, p: u32, c: u32) {\n    tokio::spawn(async move {\n        let _ = logger.log_usage(\u0026email, \u0026model, p, c);\n    });\n}\n","traces":[{"line":93,"address":[12976944],"length":1,"stats":{"Line":0}},{"line":99,"address":[18230495,18239020,18233130,18230462],"length":1,"stats":{"Line":0}},{"line":102,"address":[18005040],"length":1,"stats":{"Line":0}},{"line":108,"address":[17893348],"length":1,"stats":{"Line":0}},{"line":109,"address":[17893425],"length":1,"stats":{"Line":0}},{"line":110,"address":[17893528],"length":1,"stats":{"Line":0}},{"line":111,"address":[17893775],"length":1,"stats":{"Line":0}},{"line":113,"address":[17893357],"length":1,"stats":{"Line":0}},{"line":116,"address":[17893644,17895508],"length":1,"stats":{"Line":0}},{"line":117,"address":[17994630],"length":1,"stats":{"Line":0}},{"line":119,"address":[17893657],"length":1,"stats":{"Line":0}},{"line":122,"address":[17893987,17893688,17896368,17896378,17896416,17896417,17893934,17896335,17896320,17893718],"length":1,"stats":{"Line":0}},{"line":123,"address":[17893994],"length":1,"stats":{"Line":0}},{"line":124,"address":[17894014,17894027],"length":1,"stats":{"Line":0}},{"line":125,"address":[17894084],"length":1,"stats":{"Line":0}},{"line":129,"address":[17896384,17894131,17896385],"length":1,"stats":{"Line":0}},{"line":130,"address":[17896270,17894173,17896256],"length":1,"stats":{"Line":0}},{"line":133,"address":[17894248],"length":1,"stats":{"Line":0}},{"line":134,"address":[17894257],"length":1,"stats":{"Line":0}},{"line":135,"address":[17895717,17894462,17894770],"length":1,"stats":{"Line":0}},{"li Infallible, sync::Arc, time::{Duration, SystemTime, UNIX_EPOCH}};\nuse tokio::time::timeout;\nuse uuid::Uuid;\n\nuse super::chat_handler::Usage;\n\nconst REQUEST_TIMEOUT: Duration = Duration::from_secs(300);\n\n// Response builders\n#[derive(Serialize)]\nstruct ThinkingFullResponse {\n    id: String,\n    object: \u0026'static str,\n    created: u64,\n    model: String,\n    choices: [ThinkingChoice; 1],\n    usage: Usage,\n}\n\n#[derive(Serialize)]\nstruct ThinkingChoice {\n    index: u32,\n    message: ThinkingMessageResponse,\n    finish_reason: \u0026'static str,\n}\n\n#[derive(Serialize)]\nstruct ThinkingMessageResponse {\n    role: \u0026'static str,\n    content: Content,\n}\n\npub async fn chat_with_thinking_handler(\n    State(state): State\u003cAppState\u003e,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    let model_id = req.model.clone();\n\n    // Check if model supports reasoning (DeepSeek R1)\n    if model_supports_reasoning(\u0026model_id) {\n        return chat_with_reasoning_handler(State(state), auth, headers, Json(req)).await;\n    }\n\n    // Check if model supports thinking (Claude extended thinking)\n    if !model_supports_thinking(\u0026model_id) {\n        return chat_handler(State(state), auth, headers, Json(req)).await;\n    }\n\n    let thinking_enabled = headers\n        .get(\"x-openwebui-thinking\")\n        .and_then(|v| v.to_str().ok())\n        .map(|v| v == \"true\" || v == \"1\")\n        .unwrap_or(false);\n\n    let enabled = req.thinking.as_ref()\n        .map(|t| t.enabled.unwrap_or(false))\n        .unwrap_or(false);\n\n    if !thinking_enabled \u0026\u0026 !enabled {\n        return chat_handler(State(state), auth, headers, Json(req)).await;\n    }\n\n    thinking_handler(state, auth, headers, Json(req)).await\n}\n\nfn model_supports_thinking(model_id: \u0026str) -\u003e bool {\n    get_model_capabilities(model_id)\n        .map(|c| c.supports_thinking)\n        .unwrap_or(false)\n}\n\nfn model_supports_reasoning(model_id: \u0026str) -\u003e bool {\n    get_model_capabilities(model_id)\n        .map(|c| c.supports_reasoning)\n        .unwrap_or(false)\n}\n\nasync fn thinking_handler(\n    state: AppState,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    let temp_user_email = match auth {\n        Some(TypedHeader(Authorization(bearer))) =\u003e match state.auth.authenticate(bearer.token()) {\n            Ok(email) =\u003e email,\n            Err(_) =\u003e return StatusCode::FORBIDDEN.into_response(),\n        },\n        None =\u003e return (StatusCode::UNAUTHORIZED, \"Missing API Key\").into_response(),\n    };\n\n    let user_email = if temp_user_email == \"chat\" {\n        headers.get(\"x-openwebui-user-email\").and_then(|v| v.to_str().ok()).unwrap_or(\"anonymous\").to_string()\n    } else {\n        temp_user_email\n    };\n\n    let message_id = headers.get(\"x-openwebui-message-id\").and_then(|v| v.to_str().ok()).map(|s| s.to_owned()).unwrap_or_else(|| Uuid::new_v4().to_string());\n    let is_stream = req.stream.unwrap_or(true);\n    let client = Arc::new(state.client.clone());\n    let logger = Arc::new(state.logger.clone());\n\n    if is_stream {\n        let s = non_stream_as_stream(client, req, logger, user_email, message_id);\n        Sse::new(s).keep_alive(KeepAlive::default()).into_response()\n    } else {\n        non_stream_thinking(client, req, logger, user_email, message_id).await\n    }\n}\n\nasync fn non_stream_thinking(\n    client: Arc\u003cRuntimeClient\u003e,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e Response {\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let start_time = tokio::time::Instant::now();\n\n    let (max_tokens, budget_tokens) = parse_thinking_params(\u0026req);\n    let body = build_thinking_request(\u0026req, max_tokens, budget_tokens);\n\n    let resp = match invoke_thinking_model(\u0026client, \u0026model_id, \u0026body).await {\n        Ok(r) =\u003e r,\n        Err(_) =\u003e return (StatusCode::BAD_GATEWAY, \"Bedrock Thinking Error\").into_response(),\n    };\n\n    let mut thinking_text = String::new();\n    let mut response_text = String::new();\n\n    for block in \u0026resp.content {\n        match block.r#type.as_str() {\n            \"thinking\" =\u003e if let Some(t) = \u0026block.thinking { thinking_text.push_str(t); },\n            \"text\" =\u003e if let Some(t) = \u0026block.text { response_text.push_str(t); },\n            _ =\u003e {}\n        }\n    }\n\n    let total_duration_ms = start_time.elapsed().as_millis() as u64;\n    let model_name = req.model.clone();\n\n    let usage = Usage {\n        input_tokens: resp.usage.input_tokens,\n        output_tokens: resp.usage.output_tokens,\n        total_tokens: resp.usage.total_tokens,\n        ttft_ms: Some(total_duration_ms),\n        latency_ms: Some(total_duration_ms),\n        tokens_per_second: None,\n    };\n\n    spawn_log(logger, user_email, model_name.clone(), resp.usage.input_tokens, resp.usage.output_tokens);\n\n    let full_resp = ThinkingFullResponse {\n        id: message_id,\n        object: \"chat.completion\",\n        created: SystemTime::now().duration_since(UNIX_EPOCH).unwrap_or_default().as_secs(),\n        model: model_name,\n        choices: [ThinkingChoice {\n            index: 0,\n            message: ThinkingMessageResponse {\n                role: \"assistant\",\n                content: Content::Blocks(vec![\n                    ContentBlock { r#type: \"thinking\".to_string(), text: None, thinking: Some(thinking_text), signature: None, reasoning_content: None },\n                    ContentBlock { r#type: \"text\".to_string(), text: Some(response_text), thinking: None, signature: None, reasoning_content: None },\n                ]),\n            },\n            finish_reason: \"stop\",\n        }],\n        usage,\n    };\n\n    match serde_json::to_string(\u0026full_resp) {\n        Ok(json) =\u003e (StatusCode::OK, [(\"content-type\", \"application/json\")], json).into_response(),\n        Err(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR.into_response(),\n    }\n}\n\nfn non_stream_as_stream(\n    client: Arc\u003cRuntimeClient\u003e,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e impl Stream\u003cItem = Result\u003cEvent, Infallible\u003e\u003e {\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let model_name = req.model.clone();\n\n    let (max_tokens, budget_tokens) = parse_thinking_params(\u0026req);\n\n    async_stream::stream! {\n        yield Ok(Event::default().data(r#\"{\"type\":\"content_block_start\",\"index\":0,\"content_block\":{\"type\":\"thinking\",\"thinking\":\"\"}}\"#));\n\n        let body = build_thinking_request(\u0026req, max_tokens, budget_tokens);\n        let resp = match invoke_thinking_model(\u0026client, \u0026model_id, \u0026body).await {\n            Ok(r) =\u003e r,\n            Err(_) =\u003e { yield Ok(Event::default().data(r#\"{\"error\":\"Thinking stream failed\"}\"#)); return; }\n        };\n\n        let mut thinking_text = String::new();\n        let mut response_text = String::new();\n\n        for block in \u0026resp.content {\n            match block.r#type.as_str() {\n                \"thinking\" =\u003e if let Some(t) = \u0026block.thinking { thinking_text.push_str(t); },\n                \"text\" =\u003e if let Some(t) = \u0026block.text { response_text.push_str(t); },\n                _ =\u003e {}\n            }\n        }\n\n        if !thinking_text.is_empty() {\n            yield Ok(Event::default().data(serde_json::json!({\n                \"type\": \"content_block_delta\",\n                \"index\": 0,\n                \"delta\": { \"type\": \"thinking_delta\", \"thinking\": thinking_text }\n            }).to_string()));\n        }\n\n        yield Ok(Event::default().data(r#\"{\"type\":\"content_block_stop\",\"index\":0}\"#));\n        yield Ok(Event::default().data(r#\"{\"type\":\"content_block_start\",\"index\":1,\"content_block\":{\"type\":\"text\",\"text\":\"\"}}\"#));\n\n        if !response_text.is_empty() {\n            yield Ok(Event::default().data(serde_json::json!({\n                \"type\": \"content_block_delta\",\n                \"index\": 1,\n                \"delta\": { \"type\": \"text_delta\", \"text\": response_text }\n            }).to_string()));\n        }\n\n        yield Ok(Event::default().data(r#\"{\"type\":\"content_block_stop\",\"index\":1}\"#));\n        yield Ok(Event::default().data(serde_json::json!({\n            \"type\": \"message_delta\",\n            \"usage\": { \"output_tokens\": resp.usage.output_tokens }\n        }).to_string()));\n\n        spawn_log(logger, user_email, model_name, resp.usage.input_tokens, resp.usage.output_tokens);\n\n        yield Ok(Event::default().data(\"[DONE]\"));\n    }\n}\n\nfn spawn_log(logger: Arc\u003cClickHouseLogger\u003e, email: String, model: String, p: u32, c: u32) {\n    tokio::spawn(async move {\n        let _ = logger.log_usage(\u0026email, \u0026model, p, c);\n    });\n}\n","traces":[{"line":56,"address":[18242496],"length":1,"stats":{"Line":0}},{"line":62,"address":[18229623],"length":1,"stats":{"Line":0}},{"line":65,"address":[18229773],"length":1,"stats":{"Line":0}},{"line":66,"address":[18230101,18229781,18230062,18230157,18230564,18233156],"length":1,"stats":{"Line":0}},{"line":70,"address":[18230839],"length":1,"stats":{"Line":0}},{"line":71,"address":[18231263,18233117,18230982,18231310],"length":1,"stats":{"Line":0}},{"line":76,"address":[17995174],"length":1,"stats":{"Line":0}},{"line":77,"address":[18230923,18233376 t":"//! Embedding handler using AWS Nova 2\n\nuse crate::domain::embedding::{NovaRequest, NovaResponse, OpenAiEmbeddingData, OpenAiEmbeddingRequest, OpenAiEmbeddingResponse, OpenAiUsage};\nuse crate::shared::app_state::AppState;\n\nuse aws_sdk_bedrockruntime::primitives::Blob;\nuse axum::{extract::State, http::StatusCode, Json};\n\nconst NOVA_MODEL_ID: \u0026str = \"amazon.nova-2-multimodal-embeddings-v1:0\";\n\npub async fn handle_embeddings(\n    State(state): State\u003cAppState\u003e,\n    Json(payload): Json\u003cOpenAiEmbeddingRequest\u003e,\n) -\u003e Result\u003cJson\u003cOpenAiEmbeddingResponse\u003e, StatusCode\u003e {\n    let input_text = payload.input.first().ok_or_else(|| {\n        tracing::error!(\"Empty input array received\");\n        StatusCode::BAD_REQUEST\n    })?;\n\n    let nova_payload = NovaRequest::new(input_text);\n\n    let request_body = serde_json::to_vec(\u0026nova_payload).map_err(|e| {\n        tracing::error!(\"Serialization error: {e}\");\n        StatusCode::INTERNAL_SERVER_ERROR\n    })?;\n\n    let res = state\n        .client\n        .invoke_model()\n        .model_id(NOVA_MODEL_ID)\n        .content_type(\"application/json\")\n        .accept(\"application/json\")\n        .body(Blob::new(request_body))\n        .send()\n        .await\n        .map_err(|e| {\n            tracing::error!(\"AWS Bedrock Dispatch Error: {e:?}\");\n            StatusCode::INTERNAL_SERVER_ERROR\n        })?;\n\n    let out: NovaResponse = serde_json::from_slice(res.body().as_ref()).map_err(|e| {\n        tracing::error!(\"Failed to parse Nova response: {e}\");\n        StatusCode::INTERNAL_SERVER_ERROR\n    })?;\n\n    let embedding_entry = out.embeddings.into_iter().next().ok_or_else(|| {\n        tracing::error!(\"Nova returned empty embedding list\");\n        StatusCode::INTERNAL_SERVER_ERROR\n    })?;\n\n    let response = OpenAiEmbeddingResponse {\n        object: \"list\",\n        model: NOVA_MODEL_ID,\n        data: vec![OpenAiEmbeddingData {\n            object: \"embedding\",\n            embedding: embedding_entry.embedding,\n            index: 0,\n        }],\n        usage: OpenAiUsage {\n            prompt_tokens: out.token_count,\n            total_tokens: out.token_count,\n        },\n    };\n\n    Ok(Json(response))\n}\n","traces":[{"line":11,"address":[18201360],"length":1,"stats":{"Line":0}},{"line":15,"address":[18200096,18195381],"length":1,"stats":{"Line":0}},{"line":16,"address":[18200186,18200166,18200161,18200134,18200289],"length":1,"stats":{"Line":0}},{"line":22,"address":[18199355,18198928,18197055,18195673],"length":1,"stats":{"Line":0}},{"line":23,"address":[18199027,18199057,18198974],"length":1,"stats":{"Line":0}},{"line":27,"address":[18196080,18195718,18195981,18196648,18196630],"length":1,"stats":{"Line":0}},{"line":30,"address":[18195739],"length":1,"stats":{"Line":0}},{"line":33,"address":[18195841,18198073],"length":1,"stats":{"Line":0}},{"line":35,"address":[18196007,18195972,18196214,18198227],"length":1,"stats":{"Line":0}},{"line":36,"address":[18198400,18198916],"length":1,"stats":{"Line":0}},{"line":37,"address":[18198518,18198501,18198446,18198565],"length":1,"stats":{"Line":0}},{"line":41,"address":[18196882,18197133,18199648,18200075,18196784,18197119],"length":1,"stats":{"Line":0}},{"line":42,"address":[18199694,18199747,18199777],"length":1,"stats":{"Line":0}},{"line":46,"address":[18197457,18199376,18197236],"length":1,"stats":{"Line":0}},{"line":47,"address":[18199569,18199414,18199441,18199446,18199466],"length":1,"stats":{"Line":0}},{"line":54,"address":[18197575],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":16},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","interface","embedding","mod.rs"],"content":"//! Embedding interface module\n\npub mod embedding_handler;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","interface","mod.rs"],"content":"/ gion;\nuse aws_sdk_bedrock::Client as MgmtClient;\nuse aws_sdk_bedrockruntime::Client as RuntimeClient;\nuse axum::{\n    routing::{get, post},\n    Router,\n};\nuse infrastructure::cloudflare::CloudflareClient;\nuse std::collections::HashMap;\nuse std::sync::Arc;\n\nuse domain::auth::Authentication;\nuse domain::logging::ClickHouseLogger;\nuse shared::app_state::AppState;\n\n#[tokio::main]\nasync fn main() {\n    dotenvy::dotenv().ok();\n\n    let region_str = std::env::var(\"AWS_REGION\").unwrap_or_else(|_| \"us-east-1\".to_string());\n    let config = aws_config::from_env()\n        .region(Region::new(region_str))\n        .load()\n        .await;\n\n    let api_database =\n        std::env::var(\"DB_API_KEY_LOCATION_SQLITE\").unwrap_or_else(|_| \"api_keys.db\".to_string());\n\n    let runtime_client = RuntimeClient::new(\u0026config);\n    let mgmt_client = MgmtClient::new(\u0026config);\n    let logger = ClickHouseLogger::new();\n    let auth_service =\n        Authentication::new(\u0026api_database).expect(\"Failed to initialize authentication service\");\n\n    let _ = auth_service.register_key(\n        \u0026std::env::var(\"DEFAULT_API_KEY\").expect(\"API_KEY must be set\"),\n        \"chat\",\n    );\n\n    let state = AppState {\n        client: runtime_client,\n        mgmt_client,\n        logger,\n        file_cache: Arc::new(arc_swap::ArcSwap::from_pointee(HashMap::new())),\n        auth: auth_service,\n        cloudflare_client: if let (Ok(account_id), Ok(api_token)) = (\n            std::env::var(\"CLOUDFLARE_ACCOUNT_ID\"),\n            std::env::var(\"CLOUDFLARE_API_TOKEN\"),\n        ) {\n            Some(CloudflareClient::builder()\n                .account_id(account_id)\n                .api_token(api_token)\n                .build()\n                .expect(\"Cloudflare client should build\"))\n        } else {\n            None\n        },\n    };\n\n    // Populate models cache\n    let monitor_state = state.clone();\n    tokio::spawn(infra 026mut fmt::Formatter) -\u003e fmt::Result {\n        match self {\n            AuthError::DbError(e) =\u003e write!(f, \"Internal Database Error: {}\", e),\n            AuthError::Forbidden =\u003e write!(f, \"403 Forbidden: Invalid API Key\"),\n            AuthError::LockError =\u003e write!(f, \"Internal State Contention\"),\n        }\n    }\n}\n\nimpl std::error::Error for AuthError {}\n\n/// Authentication service for API key validation\n#[derive(Clone)]\npub struct Authentication {\n    conn: Arc\u003cMutex\u003cConnection\u003e\u003e,\n}\n\nimpl Authentication {\n    pub fn new(path: \u0026str) -\u003e Result\u003cSelf, rusqlite::Error\u003e {\n        let conn = Connection::open(path)?;\n        conn.execute(\n            \"CREATE TABLE IF NOT EXISTS api_keys (\n                id INTEGER PRIMARY KEY,\n                api_key TEXT NOT NULL UNIQUE,\n                email TEXT NOT NULL\n            )\",\n            [],\n        )?;\n\n        Ok(Self {\n            conn: Arc::new(Mutex::new(conn)),\n        })\n    }\n\n    pub fn register_key(\u0026self, api_key: \u0026str, email: \u0026str) -\u003e Result\u003c(), AuthError\u003e {\n        let conn = self.conn.lock().map_err(|_| AuthError::LockError)?;\n        conn.execute(\n            \"INSERT OR IGNORE INTO api_keys (api_key, email) VALUES (?1, ?2)\",\n            params![api_key, email],\n        )\n        .map_err(AuthError::DbError)?;\n        Ok(())\n    }\n\n    pub fn authenticate(\u0026self, provided_key: \u0026str) -\u003e Result\u003cString, AuthError\u003e {\n        let conn = self.conn.lock().map_err(|_| AuthError::LockError)?;\n\n        let result = conn.query_row(\n            \"SELECT email FROM api_keys WHERE api_key = ?1\",\n            params![provided_key],\n            |row| row.get::\u003c_, String\u003e(0),\n        );\n\n        match result {\n            Ok(email) =\u003e Ok(email),\n            Err(rusqlite::Error::QueryReturnedNoRows) =\u003e Err(AuthError::Forbidden),\n            Err(e) =\u003e Err(AuthError::DbError(e)),\n        }\n    }\n}\n","traces":[{"line":16,"address":[21628720],"length":1,"stats":{"Line":0}},{"line":17,"address":[20243265],"length":1,"stats":{"Line":0}},{"line":18,"address":[20243340],"length":1,"stats":{"Line":0}},{"line":19,"address":[19544399],"length":1,"stats":{"Line":0}},{"line":20,"address":[20243487],"length":1,"stats":{"Line":0}},{"line":34,"address":[21631377,21630544,21631406],"length":1,"stats":{"Line":0}},{"line":35,"address":[20245137],"length":1,"stats":{"Line":0}},{"line":36,"address":[19546594,19546388,19546461],"length":1,"stats":{"Line":0}},{"line":45,"address":[19546790],"length":1,"stats":{"Line":0}},{"line":46,"address":[20245734],"length":1,"stats":{"Line":0}},{"line":50,"address":[20245077,20245083,20244416],"length":1,"stats":{"Line":0}},{"line":51,"address":[20244474],"length":1,"stats":{"Line":0}},{"line":52,"address":[21630427,21630314,21630234,21630131],"length":1,"stats":{"Line":0}},{"line":54,"address":[19545662],"length":1,"stats":{"Line":0}},{"line":56,"address":[20244916,20244820],"length":1,"stats":{"Line":0}},{"line":57,"address":[19545942],"length":1,"stats":{"Line":0}},{"line":60,"address":[19545345,19545339,19544528],"length":1,"stats":{"Line":0}},{"line":61,"address":[19544576],"length":1,"stats":{"Line":0}},{"line":63,"address":[20243809,20243904],"length":1,"stats":{"Line":0}},{"line":65,"address":[19544828],"length":1,"stats":{"Line":0}},{"line":66,"address":[20226592,20226576],"length":1,"stats":{"Line":0}},{"line":69,"address":[20243957],"length":1,"stats":{"Line":0}},{"line":70,"address":[20244060],"length":1,"stats":{"Line":0}},{"line":71,"address":[20244208],"length":1,"stats":{"Line":0}},{"line":72,"address":[20244246],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":25},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","domain","chat","capabilities.rs"],"content":"//! Model capability registry for AWS Bedrock and Cloudflare models\n//! Maps OpenAI-compatible parameters to model-specific parameters\n//! Uses lowest common denominator approach\n\nuse serde::{Deserialize, Serialize};\n\n/// AI vendor enumeration\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\npub enum Vendor {\n    AwsBedrock,\n    Cloudflare,\n}\n\nimpl Vendor {\n    pub fn from_model_id(model_id: \u0026str) -\u003e Option\u003cVendor\u003e {\n        let model_lower = model_id.to_lowercase();\n        if model_lower.starts_with(\"@cf/\") {\n            Some(Vendor::Cloudflare)\n        } else if model_lower.contains(\"anthropic.\")\n            || model_lower.contains(\"deepseek\")\n            || model_lower.contains(\"cohere.\")\n            || model_lower.contains(\"ai21.\")\n            || model_lower.contains(\"mistral\")\n            || model_lower.contains(\"meta.\")\n            || model_lower.contains(\"amazon.\")\n        {\n            Some(Vendor::AwsBedrock)\n        } else {\n            None\n        }\n    }\n}\n\n/// Base parameters supported by models\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct BaseParams {\n    pub max_tokens: Option\u003cu32\u003e,\n    pub temperature: Option\u003cf32\u003e,\n    pub top_p: Option\u003cf32\u003e,\n    pub stop_sequences: Option\u003cString\u003e,\n}\n\n/// Model-specific parameters mapped from OpenAI to provider format\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ModelSpecificParams {\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub top_k: Option\u003ci32\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub frequency_penalty: Option\u003cf32\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub presence_penalty: Option\u003cf32\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub repetition_penalty: Option\u003cf32\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub count_penalty: Option\u003cf32\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub additional_params: Option\u003cserde_json::Value\u003e,\n}\n\n/// Thinking configuration for Claude extended thinking\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ThinkingConfig {\n    pub enabled: bool,\n    pub budget_tokens: Option\u003cu32\u003e,\n}\n\n/// Model capabilities and parameter mappings\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct ModelCapabilities {\n    pub provider: \u0026'static str,\n    pub vendor: Vendor,\n    pub model_id_pattern: \u0026'static str,\n    pub uses_converse_api: bool,\n    pub supports_thinking: bool,\n    pub supports_reasoning: bool,\n    pub base_params: BaseParams,\n    pub model_specific: ModelSpecificParams,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub thinking_config: Option\u003cThinkingConfig\u003e,\n}\n\nimpl ModelCapabilities {\n    pub fn matches(\u0026self, model_id: \u0026str) -\u003e bool {\n        model_id.to_lowercase().contains(self.model_id_pattern)\n    }\n}\n\n// =============================================================================\n// MODEL REGISTRY\n// =============================================================================\n\npub fn get_model_capabilities(model_id: \u0026str) -\u003e Option\u003cModelCapabilities\u003e {\n    let model_lower = model_id.to_lowercase();\n\n    // Check Cloudflare first (prefix @cf/)\n    if model_lower.starts_with(\"@cf/\") {\n        return Some(cloudflare_capabilities(\u0026model_lower));\n    }\n\n    // AWS Bedrock models\n    if model_lower.contains(\"anthropic.claude\") {\n        Some(claude_capabilities(\u0026model_lower))\n    } else if model_lower.contains(\"deepseek\") {\n        Some(deepseek_capabilities(\u0026model_lower))\n    } else if model_lower.contains(\"cohere.command\") {\n        Some(cohere_command_capabilities())\n    } else if model_lower.contains(\"ai21.j2\") || model_lower.contains(\"ai21.jurassic\") {\n        Some(ai21_jurassic_capabilities())\n    } else if model_lower.contains(\"mistral\") {\n        Some(mistral_capabilities())\n    } else if model_lower.contains(\"meta.llama\") || model_lower.contains(\"llama\") {\n        Some(meta_llama_capabilities())\n    } else if model_lower.contains(\"amazon.titan\") {\n        Some(amazon_titan_capabilities())\n    } else if model_lower.contains(\"amazon.nova\") {\n        Some(amazon_nova_capabilities())\n    } else {\n        None\n    }\n}\n\nfn claude_capabilities(model_id: \u0026str) -\u003e ModelCapabilities {\n    let supports_thinking = model_id.contains(\"claude-opus-4-5\")\n        || model_id.contains(\"claude-sonnet-4-5\")\n        || model_id.contains(\"claude-haiku-4-5\")\n        || model_id.contains(\"claude-3-7-sonnet\")\n        || model_id.contains(\"claude-3-5-sonnet\");\n\n    ModelCapabilities {\n        provider: \"anthropic\",\n        vendor: Vendor::AwsBedrock,\n        model_id_pattern: \"anthropic.claude\",\n        uses_converse_api: true,\n        supports_thinking,\n        supports_reasoning: false,\n        base_params: BaseParams {\n            max_tokens: Some(4096),\n            temperature: Some(1.0),\n            top_p: Some(0.9),\n            stop_sequences: None,\n        },\n        model_specific: ModelSpecificParams {\n            top_k: Some(250),\n            frequency_penalty: None,\n            presence_penalty: None,\n            repetition_penalty: None,\n            count_penalty: None,\n            additional_params: None,\n        },\n        thinking_config: if supports_thinking {\n            Some(ThinkingConfig {\n                enabled: false,\n                budget_tokens: Some(4000),\n            })\n        } else {\n            None\n        },\n    }\n}\n\nfn deepseek_capabilities(model_id: \u0026str) -\u003e ModelCapabilities {\n    ModelCapabilities {\n        provider: \"deepseek\",\n        vendor: Vendor::AwsBedrock,\n        model_id_pattern: \"deepseek.r1\",\n        use r::AwsBedrock,\n        model_id_pattern: \"amazon.titan\",\n        uses_converse_api: true,\n        supports_thinking: false,\n        supports_reasoning: false,\n        base_params: BaseParams {\n            max_tokens: Some(2048),\n            temperature: Some(0.5),\n            top_p: Some(0.9),\n            stop_sequences: None,\n        },\n        model_specific: ModelSpecificParams {\n            top_k: None,\n            frequency_penalty: None,\n            presence_penalty: None,\n            repetition_penalty: None,\n            count_penalty: None,\n            additional_params: None,\n        },\n        thinking_config: None,\n    }\n}\n\nfn amazon_nova_capabilities() -\u003e ModelCapabilities {\n    ModelCapabilities {\n        provider: \"amazon\",\n        vendor: Vendor::AwsBedrock,\n        model_id_pattern: \"amazon.nova\",\n        uses_converse_api: true,\n        supports_thinking: false,\n        supports_reasoning: false,\n        base_params: BaseParams {\n            max_tokens: Some(4096),\n            temperature: Some(0.7),\n            top_p: Some(0.9),\n            stop_sequences: None,\n        },\n        model_specific: ModelSpecificParams {\n            top_k: None,\n            frequency_penalty: None,\n            presence_penalty: None,\n            repetition_penalty: None,\n            count_penalty: None,\n            additional_params: None,\n        },\n        thinking_config: None,\n    }\n}\n\nfn cloudflare_capabilities(model_id: \u0026str) -\u003e ModelCapabilities {\n    // Extract the model slug from @cf/ prefix for display\n    let model_slug = model_id.strip_prefix(\"@cf/\").unwrap_or(model_id);\n    let provider = if model_slug.contains(\"meta/\") {\n        \"meta\"\n    } else if model_slug.contains(\"deepseek-ai/\") {\n        \"deepseek\"\n    } else if model_slug.contains(\"mistral/\") {\n        \"mistral\"\n    } else if model_slug.contains(\"google/\") {\n        \"google\"\n    } else {\n        \"cloudflare\"\n    };\n\n    ModelCapabilities {\n        provider,\n        vendor: Vendor::Cloudflare,\n        model_id_pattern: \"@cf/\",\n        uses_converse_api: false,\n        supports_thinking: false,\n        supports_reasoning: false,\n        base_params: BaseParams {\n            max_tokens: Some(256),\n            temperature: Some(0.7),\n            top_p: Some(0.9),\n            stop_sequences: None,\n        },\n        model_specific: ModelSpecificParams {\n            top_k: None,\n            frequency_penalty: None,\n            presence_penalty: None,\n            repetition_penalty: None,\n            count_penalty: None,\n            additional_params: None,\n        },\n        thinking_config: None,\n    }\n}\n\n// =============================================================================\n// PARAMETER MAPPING\n// =============================================================================\n\npub fn map_openai_params(\n    model_id: \u0026str,\n    temperature: Option\u003cf32\u003e,\n    top_p: Option\u003cf32\u003e,\n    max_tokens: Option\u003cu32\u003e,\n    stop_sequences: Option\u003cString\u003e,\n    frequency_penalty: Option\u003cf32\u003e,\n    presence_penalty: Option\u003cf32\u003e,\n    top_k: Option\u003ci32\u003e,\n) -\u003e (BaseParams, Option\u003cserde_json::Value\u003e) {\n    let caps = get_model_capabilities(model_id);\n\n    let base = BaseParams {\n        max_tokens: max_tokens.or(caps.as_ref().and_then(|c| c.base_params.max_tokens)),\n        temperature: temperature.or(caps.as_ref().and_then(|c| c.base_params.temperature)),\n        top_p: top_p.or(caps.as_ref().and_then(|c| c.base_params.top_p)),\n        stop_sequences,\n    };\n\n    let mut additional = serde_json::Map::new();\n\n    if let Some(ref c) = caps {\n        if c.model_specific.top_k.is_some() {\n            if let Some(k) = top_k {\n                additional.insert(\"top_k\".to_string(), serde_json::json!(k));\n            }\n        }\n\n        if let Some(fp) = frequency_penalty {\n            if c.provider == \"cohere\" {\n                additional.insert(\"frequency_penalty\".to_string(), serde_json::json!(fp));\n            } else if c.provider == \"ai21\" {\n                additional.insert(\n                    \"frequencyPenalty\".to_string(),\n                    serde_json::json!({\"scale\": fp}),\n                );\n            }\n        }\n\n        if let Some(pp) = presence_penalty {\n            if c.provider == \"cohere\" {\n                additional.insert(\"presence_penalty\".to_string(), serde_json::json!(pp));\n            } else if c.provider == \"ai21\" {\n                additional.insert(\n                    \"presencePenalty\".to_string(),\n                    serde_json::json!({\"scale\": pp}),\n                );\n            }\n        }\n    }\n\n    let additional_params = if additional.is_empty() {\n        None\n    } else {\n        Some(serde_json::Value::Object(additional))\n    };\n\n    (base, additional_params)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    // =============================================================================\n    // Model Matching Tests\n    // =============================================================================\n\n    #[test]\n    fn test_claude_model_matching() {\n        let caps = get_model_capabilities(\"anthropic.claude-3-5-sonnet-20240620-v1:0\").unwrap();\n        assert!(caps.supports_thinking);\n\n        let caps = get_model_capabilities(\"anthropic.claude-sonnet-4-5-20250929-v1:0\").unwrap();\n        assert!(caps.supports_thinking);\n        assert!(caps.thinking_config.is_some());\n    }\n\n    #[test]\n    fn test_claude_various_models() {\n        // Opus 4.5 supports thinking\n        let caps = get_model_capabilities(\"anthropic.claude-opus-4-5-20261111-v1:0\").unwrap();\n        assert!(caps.supports_thinking);\n        assert!(caps.thinking_config.is_some());\n        assert_eq!(caps.thinkin
