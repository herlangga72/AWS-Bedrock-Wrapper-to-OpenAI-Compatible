ntication failed\"),\n            ChatError::MissingApiKey =\u003e write!(f, \"Missing API key\"),\n            ChatError::BedrockError(msg) =\u003e write!(f, \"Bedrock error: {}\", msg),\n            ChatError::Timeout =\u003e write!(f, \"Request timed out\"),\n            ChatError::InvalidRequest(msg) =\u003e write!(f, \"Invalid request: {}\", msg),\n            ChatError::ModelNotFound(model) =\u003e write!(f, \"Model not found: {}\", model),\n            ChatError::UnsupportedOperation(op) =\u003e write!(f, \"Unsupported operation: {}\", op),\n        }\n    }\n}\n\nimpl std::error::Error for ChatError {}\n","traces":[{"line":25,"address":[19548928],"length":1,"stats":{"Line":0}},{"line":26,"address":[19548961],"length":1,"stats":{"Line":0}},{"line":27,"address":[19548992],"length":1,"stats":{"Line":0}},{"line":28,"address":[19549036],"length":1,"stats":{"Line":0}},{"line":29,"address":[19549085],"length":1,"stats":{"Line":0}},{"line":30,"address":[19549225],"length":1,"stats":{"Line":0}},{"line":31,"address":[19549280],"length":1,"stats":{"Line":0}},{"line":32,"address":[19549425],"length":1,"stats":{"Line":0}},{"line":33,"address":[19549570],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":9},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","domain","chat","mod.rs"],"content":"//! Chat domain - Chat completions, thinking, and reasoning\n\npub mod types;\npub mod capabilities;\npub mod errors;\n\npub use types::*;\npub use capabilities::*;\npub use errors::*;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","domain","chat","types.rs"],"content":"//! Chat domain types - Core data structures for chat completions\n\nuse serde::{Deserialize, Serialize};\n\n/// Chat completion request from OpenAI-compatible client\n#[derive(Deserialize, Clone)]\npub struct ChatRequest {\n    pub model: String,\n    pub messages: Vec\u003cMessage\u003e,\n    pub stream: Option\u003cbool\u003e,\n    pub temperature: Option\u003cf32\u003e,\n    pub top_p: Option\u003cf32\u003e,\n    pub max_tokens: Option\u003cu32\u003e,\n    pub stop_sequences: Option\u003cString\u003e,\n    // OpenAI extended params (mapped to model-specific via capabilities)\n    #[serde(default)]\n    pub frequency_penalty: Option\u003cf32\u003e,\n    #[serde(default)]\n    pub presence_penalty: Option\u003cf32\u003e,\n    #[serde(default)]\n    pub logit_bias: Option\u003cstd::collections::HashMap\u003cu32, f32\u003e\u003e,\n    #[serde(default)]\n    pub user: Option\u003cString\u003e,\n    // Model-specific params\n    #[serde(default)]\n    pub top_k: Option\u003ci32\u003e,\n    // Thinking params\n    #[serde(default)]\n    pub thinking: Option\u003cThinkingRequest\u003e,\n}\n\n/// Thinking configuration for Claude extended thinking\n#[derive(Deserialize, Serialize, Clone)]\npub struct ThinkingRequest {\n    pub enabled: Option\u003cbool\u003e,\n    pub budget_tokens: Option\u003cu32\u003e,\n}\n\n/// Chat message with role and content\n#[derive(Deserialize, Serialize, Clone)]\npub struct Message {\n    pub role: String,\n    pub content: Content,\n}\n\n/// Content can be plain text or structured blocks\n#[derive(Deserialize, Serialize, Clone)]\n#[serde(untagged)]\npub enum Content {\n    Text(String),\n    Blocks(Vec\u003cContentBlock\u003e),\n}\n\n/// Content block with type-specific fields\n#[derive(Deserialize, Serialize, Clone)]\npub struct ContentBlock {\n    pub r#type: String,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub text: Option\u003cString\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub thinking: Option\u003cString\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub signature: Option\u003cString\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub reasoning_content: Option\u003cReasoningContent\u003e,\n}\n\n/// Reasoning content for DeepSeek R1\n#[derive(Deserialize, Serialize, Clone)]\npub struct ReasoningContent {\n    pub reasoning_text: String,\n}\n\n// =============================================================================\n// Response Types\n// =============================================================================\n\n/// Usage statistics for chat completion\n#[derive(Serialize, Clone)]\npub struct Usage {\n    pub input_tokens: u32,\n    pub output_tokens: u32,\n    pub total_tokens: u32,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub completion_tokens: Option\u003cu32\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub ttft_ms: Option\u003cu64\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub latency_ms: Option\u003cu64\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub tokens_per_second: Option\u003cf64\u003e,\n}\n\n/// Full non-streaming chat completion response\n#[derive(Serialize)]\npub struct FullResponse\u003c'a\u003e {\n    pub id: \u0026'a str,\n    pub object: \u0026'static str,\n    pub created: u64,\n    pub model: \u0026'a str,\n    pub choices: [FullChoice\u003c'a\u003e; 1],\n    pub usage: Usage,\n}\n\n#[derive(Serialize)]\npub struct FullChoice\u003c'a\u003e {\n    pub index: u32,\n    pub message: FullMessage\u003c'a\u003e,\n    pub finish_reason: \u0026'static str,\n}\n\n#[derive(Serialize)]\npub struct FullMessage\u003c'a\u003e {\n    pub role: \u0026'static str,\n    pub content: \u0026'a str,\n}\n\n/// Streaming chunk for chat completion\n#[derive(Serialize)]\npub struct ChatChunk\u003c'a\u003e {\n    pub id: \u0026'a str,\n    pub object: \u0026'static str,\n    pub created: u64,\n    pub model: \u0026'a str,\n    pub choices: \u0026'a [ChunkChoice\u003c'a\u003e],\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub usage: Option\u003cUsage\u003e,\n}\n\n#[derive(Serialize)]\npub struct ChunkChoice\u003c'a\u003e {\n    pub index: u32,\n    pub delta: ChunkDelta\u003c'a\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub finish_reason: Option\u003cString\u003e,\n}\n\n#[derive(Serialize)]\npub struct ChunkDelta\u003c'a\u003e {\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub content: Option\u003c\u0026'a str\u003e,\n}\n\n// =============================================================================\n// Model Listing Types\n// =============================================================================\n\n#[derive(Debug, Serialize, Deserialize, Clone)]\npub struct ModelData {\n    pub id: String,\n    pub object: \u0026'static str,\n    pub created: u64,\n    pub owned_by: String,\n}\n\n#[derive(Debug, Serialize, Deserialize, Clone)]\npub struct ModelList {\n    pub object: \u0026'static str,\n    pub data: Vec\u003cModelData\u003e,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_chat_request_deserialization() {\n        let json = r#\"{\n            \"model\": \"anthropic.claude-sonnet-4-5-20250929-v1:0\",\n            \"messages\": [{\"role\": \"user\", \"content\": \"Hello\"}],\n            \"temperature\": 0.7\n        }\"#;\n\n        let req: ChatRequest = serde_json::from_str(json).unwrap();\n        assert_eq!(req.model, \"anthropic.claude-sonnet-4-5-20250929-v1:0\");\n        assert_eq!(req.messages.len(), 1);\n        assert_eq!(req.temperature, Some(0.7));\n        assert!(req.stream.is_none());\n    }\n\n    #[test]\n    fn test_chat_request_full_params() {\n        let json = r#\"{\n            \"model\": \"test-model\",\n            \"messages\": [{\"role\": \"assistant\", \"content\": \"Hi\"}],\n            \"stream\": true,\n            \"temperature\": 0.5,\n            \"top_p\": 0.9,\n            \"max_tokens\": 1000,\n            \"stop_sequences\": \"END\",\n            \"frequency_penalty\": 0.5,\n            \"presence_penalty\": 0.3,\n            \"top_k\": 250,\n            \"user\": \"user123\"\n        }\"#;\n\n        let req: ChatRequest = serde_json::from_str(json).unwrap();\n        assert!(req.stream.unwrap());\n        assert_eq!(req.top_p, Some(0.9));\n        assert_eq!(req.max_tokens, Some(1000));\n        assert_eq!(req.stop_sequences, Some(\"END\".to_string()));\n        assert_eq!(req.frequency_penalty, Some(0.5));\n        assert_eq!(req.presence_penalty, Some(0.3));\n        assert_eq!(req.top_k, Some(250));\n        assert_eq!(req.user, Some(\"user123\".to_string()));\n    }\n\n    #[test]\n    fn test_message_roles() {\n        let json = r#\"{\n            \"model\": \"test\",\n            \"messages\": [\n                {\"role\": \"user\", \"content\": \"Hello\"},\n                {\"role\": \"assistant\", \"content\": \"Hi there\"},\n                {\"role\": \"system\", \"content\": \"You are helpful\"}\n            ]\n        }\"#;\n\n        let req: ChatRequest = serde_json::from_str(json).unwrap();\n        assert_eq!(req.messages[0].role, \"user\");\n        assert_eq!(req.messages[1].role, \"assistant\");\n        assert_eq!(req.messages[2].role, \"system\");\n    }\n\n    #[test]\n    fn test_content_text_variant() {\n        let msg_json = r#\"{\"role\": \"user\", \"content\": \"Hello world\"}\"#;\n        let msg: Message = serde_json::from_str(msg_json).unwrap();\n\n        match msg.content {\n            Content::Text(text) =\u003e assert_eq!(text, \"Hello world\"),\n            Content::Blocks(_) =\u003e panic!(\"Expected Text variant\"),\n        }\n    }\n\n    #[test]\n    fn test_content_blocks_variant() {\n        let json = r#\"{\n            \"role\": \"assistant\",\n            \"content\": [\n                {\"type\": \"thinking\", \"thinking\": \"Let me think...\"},\n                {\"type\": \"text\", \"text\": \"Hello!\"}\n            ]\n        }\"#;\n\n        let msg: Message = serde_json::from_str(json).unwrap();\n        match msg.content {\n            Content::Text(_) =\u003e panic!(\"Expected Blocks variant\"),\n            Content::Blocks(blocks) =\u003e {\n                assert_eq!(blocks.len(), 2);\n                assert_eq!(blocks[0].r#type, \"thinking\");\n                assert_eq!(blocks[1].r#type, \"text\");\n            }\n        }\n    }\n\n    #[test]\n    fn test_content_block_serialization() {\n        let block = ContentBlock {\n            r#type: \"text\".to_string(),\n            text: Some(\"Hello\".to_string()),\n            thinking: None,\n            signature: None,\n            reasoning_content: None,\n        };\n\n        let json = serde_json::to_string(\u0026block).unwrap();\n        assert!(json.contains(\"\\\"type\\\":\\\"text\\\"\"));\n        assert!(json.contains(\"\\\"text\\\":\\\"Hello\\\"\"));\n    }\n\n    #[test]\n    fn test_content_block_skip_none_fields() {\n        let block = ContentBlock {\n            r#type: \"thinking\".to_string(),\n            text: None,\n            thinking: Some(\"thinking...\".to_string()),\n            signature: None,\n            reasoning_content: None,\n        };\n\n        let json = serde_json::to_string(\u0026block).unwrap();\n        // Should NOT contain \"text\", \"signature\", \"reasoning_content\" keys since they're None\n        assert!(!json.contains(\"\\\"text\\\"\"));\n        assert!(json.contains(\"\\\"thinking\\\":\\\"thinking...\\\"\"));\n    }\n\n    #[test]\n    fn test_thinking_request_deserialization() {\n        let json = r#\"{\"enabled\": true, \"budget_tokens\": 8000}\"#;\n        let thinking: ThinkingRequest = serde_json::from_str(json).unwrap();\n        assert!(thinking.enabled.unwrap());\n        assert_eq!(thinking.budget_tokens, Some(8000));\n    }\n\n    #[test]\n    fn test_thinking_request_partial() {\n        let json = r#\"{\"budget_tokens\": 4000}\"#;\n        let thinking: ThinkingRequest = serde_json::from_str(json).unwrap();\n        assert!(thinking.enabled.is_none());\n        assert_eq!(thinking.budget_tokens, Some(4000));\n    }\n\n    #[test]\n    fn test_reasoning_content_serde() {\n        let rc = ReasoningContent {\n            reasoning_text: \"Because...\".to_string(),\n        };\n\n        let json = serde_json::to_string(\u0026rc).unwrap();\n        assert!(json.contains(\"\\\"reasoning_text\\\":\\\"Because...\\\"\"));\n\n        let parsed: ReasoningContent = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(parsed.reasoning_text, \"Because...\");\n    }\n\n    #[test]\n    fn test_usage_serialization() {\n        let usage = Usage {\n            input_tokens: 100,\n            output_tokens: 200,\n            total_tokens: 300,\n            completion_tokens: Some(200),\n            ttft_ms: Some(50),\n            latency_ms: Some(150),\n            tokens_per_second: Some(13.33),\n        };\n\n        let json = serde_json::to_string(\u0026usage).unwrap();\n        assert!(json.contains(\"\\\"input_tokens\\\":100\"));\n        assert!(json.contains(\"\\\"output_tokens\\\":200\"));\n        assert!(json.contains(\"\\\"completion_tokens\\\":200\"));\n    }\n\n    #[test]\n    fn test_usage_skip_optional_fields() {\n        let usage = Usage {\n            input_tokens: 100,\n            output_tokens: 200,\n            total_tokens: 300,\n            completion_tokens: None,\n            ttft_ms: None,\n            latency_ms: None,\n            tokens_per_second: None,\n        };\n\n        let json = serde_json::to_string(\u0026usage).unwrap();\n        assert!(!json.contains(\"completion_tokens\"));\n        assert!(!json.contains(\"ttft_ms\"));\n    }\n\n    #[test]\n    fn test_model_data_serde() {\n        let json = r#\"{\n            \"id\": \"anthropic.claude-sonnet-4-5-20250929-v1:0\",\n            \"object\": \"model\",\n            \"created\": 1234567890,\n            \"owned_by\": \"anthropic\"\n        }\"#;\n\n        let model: ModelData = serde_json::from_str(json).unwrap();\n        assert_eq!(model.id, \"anthropic.claude-sonnet-4-5-20250929-v1:0\");\n        assert_eq!(model.object, \"model\");\n        assert_eq!(model.created, 1234567890);\n        assert_eq!(model.owned_by, \"anthropic\");\n    }\n\n    #[test]\n    fn test_model_list_serde() {\n        let json = r#\"{\n            \"object\": \"list\",\n            \"data\": [\n                {\"id\": \"model1\", \"object\": \"model\", \"created\": 0, \"owned_by\": \"test\"},\n                {\"id\": \"model2\", \"object\": \"model\", \"created\": 0, \"owned_by\": \"test\"}\n            ]\n        }\"#;\n\n        let list: ModelList = serde_json::from_str(json).unwrap();\n        assert_eq!(list.object, \"list\");\n        assert_eq!(list.data.len(), 2);\n        assert_eq!(list.data[0].id, \"model1\");\n        assert_eq!(list.data[1].id, \"model2\");\n    }\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","domain","embedding","mod.rs"],"content":"//! Embedding domain - Text embedding generation\n\npub mod types;\n\npub use types::*;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","domain","embedding","types.rs"],"content":"//! Embedding domain types\n\nuse serde::{Deserialize, Serialize};\nuse std::borrow::Cow;\n\n// =============================================================================\n// Request Types\n// =============================================================================\n\n/// OpenAI-compatible embedding request\n#[derive(Deserialize)]\npub struct OpenAiEmbeddingRequest {\n    pub input: Vec\u003cString\u003e,\n}\n\n// =============================================================================\n// Internal Request Types (for AWS Nova)\n// =============================================================================\n\n#[derive(Serialize)]\npub struct NovaRequest\u003c'a\u003e {\n    #[serde(rename = \"taskType\")]\n    task_type: \u0026'static str,\n    #[serde(rename = \"singleEmbeddingParams\")]\n    params: NovaParams\u003c'a\u003e,\n}\n\n#[derive(Serialize)]\nstruct NovaParams\u003c'a\u003e {\n    #[serde(rename = \"embeddingPurpose\")]\n    embedding_purpose: \u0026'static str,\n    #[serde(rename = \"embeddingDimension\")]\n    dimension: u32,\n    text: NovaText\u003c'a\u003e,\n}\n\n#[derive(Serialize)]\nstruct NovaText\u003c'a\u003e {\n    #[serde(rename = \"truncationMode\")]\n    truncation_mode: \u0026'static str,\n    value: Cow\u003c'a, str\u003e,\n}\n\n// =============================================================================\n// AWS Response Types\n// =============================================================================\n\n#[derive(Deserialize)]\npub struct NovaResponse {\n    pub embeddings: Vec\u003cNovaEmbeddingEntry\u003e,\n    #[serde(rename = \"inputTextTokenCount\")]\n    pub token_count: u64,\n}\n\n#[derive(Deserialize)]\npub struct NovaEmbeddingEntry {\n    pub embedding: Vec\u003cf32\u003e,\n}\n\n// =============================================================================\n// OpenAI Response Types\n// =============================================================================\n\n#[derive(Serialize)]\npub struct OpenAiEmbeddingResponse {\n    pub object: \u0026'static str,\n    pub data: Vec\u003cOpenAiEmbeddingData\u003e,\n    pub model: \u0026'static str,\n    pub usage: OpenAiUsage,\n}\n\n#[derive(Serialize)]\npub struct OpenAiEmbeddingData {\n    pub object: \u0026'static str,\n    pub embedding: Vec\u003cf32\u003e,\n    pub index: usize,\n}\n\n#[derive(Serialize)]\npub struct OpenAiUsage {\n    pub prompt_tokens: u64,\n    pub total_tokens: u64,\n}\n\n// =============================================================================\n// Builder for Nova Request\n// =============================================================================\n\nimpl\u003c'a\u003e NovaRequest\u003c'a\u003e {\n    pub fn new(text: \u0026'a str) -\u003e Self {\n        Self {\n            task_type: \"SINGLE_EMBEDDING\",\n            params: NovaParams {\n                embedding_purpose: \"GENERIC_INDEX\",\n                dimension: 3072,\n                text: NovaText {\n                    truncation_mode: \"END\",\n                    value: Cow::Borrowed(text),\n                },\n            },\n        }\n    }\n\n    pub fn with_dimension(mut self, dimension: u32) -\u003e Self {\n        self.params.dimension = dimension;\n        self\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_openai_embedding_request_deserialization() {\n        let json = r#\"{\"input\": [\"Hello world\", \"Goodbye\"]}\"#;\n        let req: OpenAiEmbeddingRequest = serde_json::from_str(json).unwrap();\n        assert_eq!(req.input.len(), 2);\n        assert_eq!(req.input[0], \"Hello world\");\n    }\n\n    #[test]\n    fn test_openai_embedding_request_single_input() {\n        let json = r#\"{\"input\": [\"Single text\"]}\"#;\n        let req: OpenAiEmbeddingRequest = serde_json::from_str(json).unwrap();\n        assert_eq!(req.input.len(), 1);\n    }\n\n    #[test]\n    fn test_nova_request_builder() {\n        let req = NovaRequest::new(\"Hello world\");\n\n        assert_eq!(req.task_type, \"SINGLE_EMBEDDING\");\n        assert_eq!(req.params.embedding_purpose, \"GENERIC_INDEX\");\n        assert_eq!(req.params.dimension, 3072);\n        assert_eq!(req.params.text.truncation_mode, \"END\");\n        assert_eq!(req.params.text.value, \"Hello world\");\n    }\n\n    #[test]\n    fn test_nova_request_with_custom_dimension() {\n        let req = NovaRequest::new(\"Hello\").with_dimension(1024);\n        assert_eq!(req.params.dimension, 1024);\n    }\n\n    #[test]\n    fn test_nova_request_serialization() {\n        let req = NovaRequest::new(\"Test text\");\n        let json = serde_json::to_string(\u0026req).unwrap();\n\n        assert!(json.contains(\"\\\"taskType\\\":\\\"SINGLE_EMBEDDING\\\"\"));\n        assert!(json.contains(\"\\\"embeddingPurpose\\\":\\\"GENERIC_INDEX\\\"\"));\n        assert!(json.contains(\"\\\"embeddingDimension\\\":3072\"));\n        assert!(json.contains(\"\\\"truncationMode\\\":\\\"END\\\"\"));\n        assert!(json.contains(\"\\\"value\\\":\\\"Test text\\\"\"));\n    }\n\n    #[test]\n    fn test_nova_response_deserialization() {\n        let json = r#\"{\n            \"embeddings\": [\n                {\"embedding\": [0.1, 0.2, 0.3]},\n                {\"embedding\": [0.4, 0.5, 0.6]}\n            ],\n            \"inputTextTokenCount\": 10\n        }\"#;\n\n        let resp: NovaResponse = serde_json::from_str(json).unwrap();\n        assert_eq!(resp.embeddings.len(), 2);\n        assert_eq!(resp.embeddings[0].embedding, vec![0.1, 0.2, 0.3]);\n        assert_eq!(resp.embeddings[1].embedding, vec![0.4, 0.5, 0.6]);\n        assert_eq!(resp.token_count, 10);\n    }\n\n    #[test]\n    fn test_openai_embedding_response_serialization() {\n        let resp = OpenAiEmbeddingResponse {\n            object: \"list\",\n            model: \"amazon.nova-2-embeddings-v1:0\",\n            data: vec![\n                OpenAiEmbeddingData {\n                    object: \"embedding\",\n                    embedding: vec![0.1, 0.2, 0.3],\n                    index: 0,\n                },\n            ],\n            usage: OpenAiUsage {\n                prompt_tokens: 5,\n                total_tokens: 5,\n            },\n        };\n\n        let json = serde_json::to_string(\u0026resp).unwrap();\n        assert!(json.contains(\"\\\"object\\\":\\\"list\\\"\"));\n        assert!(json.contains(\"\\\"model\\\":\\\"amazon.nova-2-embeddings-v1:0\\\"\"));\n        assert!(json.contains(\"\\\"embedding\\\":[0.1,0.2,0.3]\"));\n        assert!(json.contains(\"\\\"prompt_tokens\\\":5\"));\n    }\n\n    #[test]\n    fn test_openai_usage_serialization() {\n        let usage = OpenAiUsage {\n            prompt_tokens: 100,\n            total_tokens: 150,\n        };\n\n        let json = serde_json::to_string(\u0026usage).unwrap();\n        assert!(json.contains(\"\\\"prompt_tokens\\\":100\"));\n        assert!(json.contains(\"\\\"total_tokens\\\":150\"));\n    }\n}\n","traces":[{"line":90,"address":[20066480],"length":1,"stats":{"Line":2}},{"line":93,"address":[20066607],"length":1,"stats":{"Line":4}},{"line":104,"address":[20066432],"length":1,"stats":{"Line":2}},{"line":105,"address":[20066448],"length":1,"stats":{"Line":2}},{"line":106,"address":[20066451],"length":1,"stats":{"Line":2}}],"covered":5,"coverable":5},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","domain","logging","mod.rs"],"content":"//! Logging domain - Usage logging to ClickHouse\n\npub mod types;\n\npub use types::*;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","domain","logging","types.rs"],"content":"//! Logging domain types - Usage logging to ClickHouse\n\nuse clickhouse::{Client, Row};\nuse serde::Serialize;\nuse std::time::Duration;\nuse tokio::sync::mpsc;\nuse tokio::time::{interval, MissedTickBehavior};\n\n/// Log entry for usage tracking\n#[derive(Row, Serialize, Clone)]\npub struct LogEntry {\n    #[serde(with = \"clickhouse::serde::chrono::datetime\")]\n    pub timestamp: chrono::DateTime\u003cchrono::Utc\u003e,\n    pub model: String,\n    pub user_email: String,\n    pub input_tokens: u32,\n    pub output_tokens: u32,\n}\n\n/// ClickHouse logger for batched usage logging\n#[derive(Clone)]\npub struct ClickHouseLogger {\n    tx: mpsc::Sender\u003cLogEntry\u003e,\n}\n\nimpl ClickHouseLogger {\n    pub fn new() -\u003e Self {\n        let url =\n            std::env::var(\"CLICKHOUSE_URL\").unwrap_or_else(|_| \"http://127.0.0.1:8123\".to_string());\n        let user = std::env::var(\"CLICKHOUSE_USER\").unwrap_or_else(|_| \"default\".to_string());\n        let pass = std::env::var(\"CLICKHOUSE_PASSWORD\").expect(\"CLICKHOUSE_PASSWORD must be set\");\n        let db = std::env::var(\"CLICKHOUSE_DB\").unwrap_or_else(|_| \"default\".to_string());\n\n        let (tx, mut rx) = mpsc::channel::\u003cLogEntry\u003e(4096);\n\n        let client = Client::default()\n            .with_url(url)\n            .with_user(user)\n            .with_password(pass)\n            .with_database(db)\n            .with_compression(clickhouse::Compression::Lz4);\n\n        tokio::spawn(async move {\n            let mut batch = Vec::with_capacity(5000);\n            let mut ticker = interval(Duration::from_secs(2));\n            ticker.set_missed_tick_behavior(MissedTickBehavior::Delay);\n\n            loop {\n                tokio::select! {\n                    Some(entry) = rx.recv() =\u003e {\n                        batch.push(entry);\n                        if batch.len() \u003e= 5000 {\n                            Self::flush(\u0026client, \u0026mut batch).await;\n                        }\n                    }\n                    _ = ticker.tick() =\u003e {\n                        if !batch.is_empty() {\n                            Self::flush(\u0026client, \u0026mut batch).await;\n                        }\n                    }\n                    else =\u003e break,\n                }\n            }\n        });\n\n        Self { tx }\n    }\n\n    async fn flush(client: \u0026Client, batch: \u0026mut Vec\u003cLogEntry\u003e) {\n        let mut inserter = match client.insert::\u003cLogEntry\u003e(\"chat_logs\").await {\n            Ok(ins) =\u003e ins,\n            Err(e) =\u003e {\n                eprintln!(\"[ClickHouse] Connection failed: {:?}\", e);\n                batch.clear();\n                return;\n            }\n        };\n\n        for entry in batch.drain(..) {\n            if let Err(e) = inserter.write(\u0026entry).await {\n                eprintln!(\"[ClickHouse] Write failed: {:?}\", e);\n                break;\n            }\n        }\n\n        if let Err(e) = inserter.end().await {\n            eprintln!(\"[ClickHouse] Commit failed: {:?}\", e);\n        }\n    }\n\n    pub fn log_usage(\u0026self, email: \u0026str, model: \u0026str, input: u32, output: u32) {\n        let entry = LogEntry {\n            timestamp: chrono::Utc::now(),\n            model: model.to_string(),\n            user_email: email.to_string(),\n            input_tokens: input,\n            output_tokens: output,\n        };\n\n        let _ = self.tx.try_send(entry);\n    }\n}\n","traces":[{"line":27,"address":[20413490,20412368,20413559],"length":1,"stats":{"Line":0}},{"line":28,"address":[20412375],"length":1,"stats":{"Line":0}},{"line":30,"address":[20412486,20412551],"length":1,"stats":{"Line":0}},{"line":31,"address":[20412586,20412655],"length":1,"stats":{"Line":0}},{"line":32,"address":[22050649,22050577],"length":1,"stats":{"Line":0}},{"line":34,"address":[20441635,20441551],"length":1,"stats":{"Line":0}},{"line":36,"address":[22050788],"length":1,"stats":{"Line":0}},{"line":37,"address":[22050848],"length":1,"stats":{"Line":0}},{"line":38,"address":[20413041],"length":1,"stats":{"Line":0}},{"line":39,"address":[20413106],"length":1,"stats":{"Line":0}},{"line":40,"address":[20441932],"length":1,"stats":{"Line":0}},{"line":41,"address":[20442007],"length":1,"stats":{"Line":0}},{"line":43,"address":[20442039],"length":1,"stats":{"Line":0}},{"line":44,"address":[20073024],"length":1,"stats":{"Line":0}},{"line":45,"address":[20073206,20073287],"length":1,"stats":{"Line":0}},{"line":46,"address":[20073320,20073394],"length":1,"stats":{"Line":0}},{"line":48,"address":[20073913],"length":1,"stats":{"Line":0}},{"line":49,"address":[19406463,19407125,19406679,19406605,19406741,19406799],"length":1,"stats":{"Line":0}},{"line":50,"address":[20073937,20075119,20077000],"length":1,"stats":{"Line":0}},{"line":51,"address":[20075194],"length":1,"stats":{"Line":0}},{"line":52,"address":[22595514],"length":1,"stats":{"Line":0}},{"line":53,"address":[20075310,20073116,20075408,20073497],"length":1,"stats":{"Line":0}},{"line":56,"address":[20426558],"length":1,"stats":{"Line":0}},{"line":57,"address":[204  Converse API implementation\n\nuse aws_sdk_bedrockruntime::types::{\n    ContentBlock as BContentBlock, ConversationRole, InferenceConfiguration,\n    Message as BedrockMessage, SystemContentBlock,\n};\nuse aws_sdk_bedrockruntime::Client as RuntimeClient;\nuse std::time::Duration;\n\nuse crate::domain::chat::{map_openai_params, ChatRequest, Content};\nuse crate::domain::logging::ClickHouseLogger;\n\nconst REQUEST_TIMEOUT: Duration = Duration::from_secs(60);\n\n/// Bedrock converse API payload\npub struct ConversePayload {\n    pub system: Option\u003cVec\u003cSystemContentBlock\u003e\u003e,\n    pub messages: Vec\u003cBedrockMessage\u003e,\n    pub inference_config: InferenceConfiguration,\n}\n\n/// Build payload for Converse API from ChatRequest\npub fn build_converse_payload(req: \u0026ChatRequest) -\u003e ConversePayload {\n    let total_len = req.messages.len();\n    let mut bedrock_messages = Vec::with_capacity(total_len);\n    let mut system_blocks = Vec::new();\n\n    let (base_params, _) = map_openai_params(\n        \u0026req.model,\n        req.temperature,\n        req.top_p,\n        req.max_tokens,\n        req.stop_sequences.clone(),\n        req.frequency_penalty,\n        req.presence_penalty,\n        req.top_k,\n    );\n\n    for m in \u0026req.messages {\n        match m.role.as_str() {\n            \"user\" =\u003e {\n                let text = extract_text_from_content(\u0026m.content);\n                if let Ok(msg) = BedrockMessage::builder()\n                    .role(ConversationRole::User)\n                    .content(BContentBlock::Text(text))\n                    .build()\n                {\n                    bedrock_messages.push(msg);\n                }\n            }\n            \"assistant\" =\u003e {\n                let text = extract_text_from_content(\u0026m.content);\n                if let Ok(msg) = BedrockMessage::builder()\n                    .role(ConversationRole::Assistant)\n                    .content(BContentBlock::Text(text))\n                    .build()\n                {\n                    bedrock_messages.push(msg);\n                }\n            }\n            \"system\" =\u003e {\n                let text = extract_text_from_content(\u0026m.content);\n                system_blocks.push(SystemContentBlock::Text(text));\n            }\n            _ =\u003e {}\n        }\n    }\n\n    let mut config_builder = InferenceConfiguration::builder()\n        .set_temperature(base_params.temperature)\n        .set_top_p(base_params.top_p)\n        .set_max_tokens(base_params.max_tokens.map(|m| m as i32));\n\n    if let Some(stop) = \u0026base_params.stop_sequences {\n        config_builder = config_builder.set_stop_sequences(Some(vec![stop.clone()]));\n    }\n\n    ConversePayload {\n        system: if system_blocks.is_empty() {\n            None\n        } else {\n            Some(system_blocks)\n        },\n        messages: bedrock_messages,\n        inference_config: config_builder.build(),\n    }\n}\n\n/// Extract text from content\npub fn extract_text_from_content(content: \u0026Content) -\u003e String {\n    match content {\n        Content::Text(s) =\u003e s.clone(),\n        Content::Blocks(blocks) =\u003e {\n            blocks.iter().filter_map(|b| b.text.clone()).collect::\u003cVec\u003c_\u003e\u003e().join(\"\\n\")\n        }\n    }\n}\n\n/// Spawn logging task\npub fn spawn_log(\n    logger: std::sync::Arc\u003cClickHouseLogger\u003e,\n    email: String,\n    model: String,\n    p: u32,\n    c: u32,\n) {\n    tokio::spawn(async move {\n        let _ = logger.log_usage(\u0026email, \u0026model, p, c);\n    });\n}\n","traces":[{"line":23,"address":[20496935,20493248,20494890],"length":1,"stats":{"Line":0}},{"line":24,"address":[20297460],"length":1,"stats":{"Line":0}},{"line":25,"address":[20297540],"length":1,"stats":{"Line":0}},{"line":26,"address":[20297565],"length":1,"stats":{"Line":0}},{"line":29,"address":[20493469],"length":1,"stats":{"Line":0}},{"line":30  \u0026'a str,\n    content: ThinkingContent\u003c'a\u003e,\n}\n\n#[derive(Serialize)]\nenum ThinkingContent\u003c'a\u003e {\n    Text(\u0026'a str),\n    Blocks(Vec\u003cThinkingContentBlock\u003c'a\u003e\u003e),\n}\n\n#[derive(Serialize)]\nstruct ThinkingContentBlock\u003c'a\u003e {\n    r#type: \u0026'static str,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    text: Option\u003c\u0026'a str\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    thinking: Option\u003c\u0026'a str\u003e,\n}\n\n// =============================================================================\n// Response Types\n// =============================================================================\n\n#[derive(Deserialize, Debug)]\npub struct ThinkingResponse {\n    pub content: Vec\u003cResponseContentBlock\u003e,\n    #[serde(default)]\n    stop_reason: String,\n    pub usage: ResponseUsage,\n}\n\n#[derive(Deserialize, Debug)]\npub struct ResponseContentBlock {\n    pub r#type: String,\n    #[serde(default)]\n    pub text: Option\u003cString\u003e,\n    #[serde(default)]\n    pub thinking: Option\u003cString\u003e,\n    #[serde(default)]\n    signature: Option\u003cString\u003e,\n}\n\n#[derive(Deserialize, Debug)]\npub struct ResponseUsage {\n    pub input_tokens: u32,\n    pub output_tokens: u32,\n    pub total_tokens: u32,\n}\n\n// =============================================================================\n// Request Builder\n// =============================================================================\n\n/// Build thinking request body for Claude models\npub fn build_thinking_request(req: \u0026ChatRequest, max_tokens: u32, budget_tokens: u32) -\u003e ThinkingRequestBody\u003c'_\u003e {\n    let thinking_block = Some(ThinkingBlock {\n        r#type: \"enabled\",\n        budget_tokens,\n    });\n\n    let messages: Vec\u003cThinkingMessage\u003c'_\u003e\u003e = req.messages.iter().map(|m| {\n        let role = match m.role.as_str() {\n            \"user r_else(|| \"bedrock\".into()),\n        })\n        .collect();\n\n    let response_body = ModelList {\n        object: \"list\",\n        data,\n    };\n    let bytes = Bytes::from(serde_json::to_vec(\u0026response_body)?);\n\n    let mut new_map = HashMap::with_capacity(1);\n    new_map.insert(BEDROCK_MODELS_KEY.to_string(), bytes.clone());\n    file_cache.store(Arc::new(new_map));\n\n    let _ = fs::write(\"/tmp/bedrock_models_cache.json\", bytes).await;\n\n    Ok(())\n}\n\n/// Run cache monitor that refreshes periodically\npub async fn run_cache_monitor(state: crate::shared::app_state::AppState) {\n    let mut interval = tokio::time::interval(Duration::from_secs(3600));\n\n    loop {\n        interval.tick().await;\n        if let Err(e) = refresh_models_cache(\u0026state.mgmt_client, \u0026state.file_cache).await {\n            eprintln!(\"Cache refresh failed: {e}\");\n        }\n    }\n}\n","traces":[{"line":17,"address":[20191168],"length":1,"stats":{"Line":0}},{"line":21,"address":[20068623,20068754,20068891,20068672,20070543],"length":1,"stats":{"Line":0}},{"line":23,"address":[20369247],"length":1,"stats":{"Line":0}},{"line":26,"address":[22011600,22011139,22009501,22010992],"length":1,"stats":{"Line":0}},{"line":27,"address":[20071051],"length":1,"stats":{"Line":0}},{"line":30,"address":[20071075,20071808,20071820],"length":1,"stats":{"Line":0}},{"line":38,"address":[20370348,20369550,20369482],"length":1,"stats":{"Line":0}},{"line":40,"address":[20069793],"length":1,"stats":{"Line":0}},{"line":41,"address":[20069913,20069867,20070421,20069983],"length":1,"stats":{"Line":0}},{"line":42,"address":[20070143],"length":1,"stats":{"Line":0}},{"line":44,"address":[22100386],"length":1,"stats":{"Line":0}},{"line":46,"address":[20070838],"length":1,"stats":{"Line":0}},{"line":50,"address":[20191121,20191104],"length":1,"stats":{"Line":0}},{"line":51,"address":[20067335,20067451],"length":1,"stats":{"Line":0}},{"line":54,"address":[20067483,20068121,20068049,2006 \n    pub fn base_url(mut self, base_url: impl Into\u003cString\u003e) -\u003e Self {\n        self.base_url = Some(base_url.into());\n        self\n    }\n\n    pub fn build(self) -\u003e Result\u003cCloudflareClient, String\u003e {\n        let account_id = self.account_id.ok_or(\"account_id is required\")?;\n        let api_token = self.api_token.ok_or(\"api_token is required\")?;\n        let base_url = self.base_url.unwrap_or_else(|| DEFAULT_CF_BASE_URL.to_string());\n\n        Ok(CloudflareClient {\n            client: Client::builder()\n                .timeout(Duration::from_secs(120))\n                .build()\n                .map_err(|e| e.to_string())?,\n            account_id,\n            api_token,\n            base_url,\n        })\n    }\n}\n\nimpl CloudflareClient {\n    /// Create a new Cloudflare client using builder pattern\n    pub fn builder() -\u003e CloudflareClientBuilder {\n        CloudflareClientBuilder::new()\n    }\n\n    /// Check if a model ID is a Cloudflare model\n    pub fn is_cloudflare_model(model_id: \u0026str) -\u003e bool {\n        model_id.starts_with(\"@cf/\")\n    }\n\n    /// Build the full endpoint URL for a model\n    fn endpoint_url(\u0026self, model: \u0026str) -\u003e String {\n        format!(\"{}/{}/ai/run/{}\", self.base_url, self.account_id, model)\n    }\n\n    /// Execute a chat completion request\n    pub async fn chat(\u0026self, req: ChatRequest) -\u003e Result\u003cCloudflareResponse, String\u003e {\n        let url = self.endpoint_url(\u0026req.model);\n\n        let cf_req = CloudflareRequest {\n            messages: req.messages.into_iter().map(Into::into).collect(),\n            max_tokens: req.max_tokens.unwrap_or(256),\n            stream: false,\n            temperature: req.temperature,\n        };\n\n        let resp = self\n            .client\n            .post(\u0026url)\n            .header(\"Authorization\", format!(\"Bearer {}\", self.api_token))\n            .header(\"Content-Type\", \"application/json\")\n            .json(\u0026cf_req)\n            .send()\n            .await\n            .map_err(|e| e.to_string())?;\n\n        if !resp.status().is_success() {\n            let status = resp.status();\n            let body = resp.text().await.unwrap_or_default();\n            return Err(format!(\"Cloudflare API error {}: {}\", status, body));\n        }\n\n        resp.json::\u003cCloudflareResponse\u003e()\n            .await\n            .map_err(|e| e.to_string())\n    }\n\n    /// Execute a streaming chat completion request\n    pub async fn chat_streaming(\n        \u0026self,\n        req: ChatRequest,\n    ) -\u003e Result\u003cimpl Stream\u003cItem = Result\u003cString, String\u003e\u003e, String\u003e {\n        let url = self.endpoint_url(\u0026req.model);\n\n        let cf_req = CloudflareRequest {\n            messages: req.messages.into_iter().map(Into::into).collect(),\n            max_tokens: req.max_tokens.unwrap_or(256),\n            stream: true,\n            temperature: req.temperature,\n        };\n\n        let resp = self\n            .client\n            .post(\u0026url)\n            .header(\"Authorization\", format!(\"Bearer {}\", self.api_token))\n            .header(\"Content-Type\", \"application/json\")\n            .send()\n            .await\n            .map_err(|e| e.to_string())?;\n\n        if !resp.status().is_success() {\n            let status = resp.status();\n            return Err(format!(\"Cloudflare API error: {}\", status));\n        }\n\n        let stream = resp.bytes_stream().map(|chunk: Result\u003cbytes::Bytes, reqwest::Error\u003e| {\n            chunk.map(|b| String::from_utf8_lossy(\u0026b).to_string()).map_err(|e| e.to_string())\n        });\n        Ok(stream)\n    }\n}\n\n// =============================================================================\n// Cloudflare API Request/Response Types\n// =============================================================================\n\n#[derive(Serialize)]\nstruct CloudflareRequest {\n    messages: Vec\u003cCfMessage\u003e,\n    max_tokens: u32,\n    stream: bool,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    temperature: Option\u003cf32\u003e,\n}\n\n#[derive(Serialize, Deserialize, Clone)]\nstruct CfMessage {\n    role: String,\n    content: String,\n}\n\nimpl From\u003cMessage\u003e for CfMessage {\n    fn from(msg: Message) -\u003e Self {\n        let content = match msg.content {\n            Content::Text(s) =\u003e s,\n            Content::Blocks(blocks) =\u003e blocks\n                .iter()\n                .filter_map(|b| b.text.clone())\n                .collect::\u003cVec\u003c_\u003e\u003e()\n                .join(\"\\n\"),\n        };\n        Self {\n            role: msg.role,\n            content,\n        }\n    }\n}\n\n#[derive(Deserialize, Debug)]\npub struct CloudflareResponse {\n    pub id: Option\u003cString\u003e,\n    pub result: Option\u003cCfResult\u003e,\n}\n\n#[derive(Deserialize, Debug)]\npub struct CfResult {\n    pub messages: Vec\u003cCfResponseMessage\u003e,\n    pub usage: Option\u003cCfUsage\u003e,\n}\n\n#[derive(Deserialize, Debug)]\npub struct CfResponseMessage {\n    pub role: String,\n    pub content: String,\n}\n\n#[derive(Deserialize, Debug, Clone)]\npub struct CfUsage {\n    pub input_tokens: Option\u003cu32\u003e,\n    pub output_tokens: Option\u003cu32\u003e,\n}\n\n// =============================================================================\n// OpenAI-compatible Response Conversion\n// =============================================================================\n\nimpl CloudflareResponse {\n    /// Convert to OpenAI-compatible response format\n    pub fn to_openai_response(\u0026self, model: \u0026str, request_id: \u0026str) -\u003e OpenAiChatResponse {\n        let content = self\n            .result\n            .as_ref()\n            .and_then(|r| r.messages.first())\n            .map(|m| m.content.clone())\n            .unwrap_or_default();\n\n        let usage = self.result.as_ref().and_then(|r| r.usage.clone());\n\n        OpenAiChatResponse {\n            id: request_id.to_string(),\n            object: \"chat.completion\".to_string(),\n            created: chrono::Utc::now().timestamp() as u64,\n            model: model.to_string(),\n            choices: vec![OpenAiChoice {\n                index: 0,\n                message: OpenAiMessage {\n                    role: \"assistant\".to_string(),\n                    content,\n                },\n                finish_reason: Some(\"stop\".to_string()),\n            }],\n            usage: usage.map(|u| OpenAiUsage {\n                prompt_tokens: u.input_tokens.unwrap_or(0),\n                completion_tokens: u.output_tokens.unwrap_or(0),\n                total_tokens: u.input_tokens.unwrap_or(0) + u.output_tokens.unwrap_or(0),\n            }),\n        }\n    }\n}\n\n#[derive(Serialize)]\npub struct OpenAiChatResponse {\n    pub id: String,\n    pub object: String,\n    pub created: u64,\n    pub model: String,\n    pub choices: Vec\u003cOpenAiChoice\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub usage: Option\u003cOpenAiUsage\u003e,\n}\n\n#[derive(Serialize)]\npub struct OpenAiChoice {\n    pub index: u32,\n    pub message: OpenAiMessage,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub finish_reason: Option\u003cString\u003e,\n}\n\n#[derive(Serialize)]\npub struct OpenAiMessage {\n    pub role: String,\n    pub content: String,\n}\n\n#[derive(Serialize)]\npub struct OpenAiUsage {\n    pub prompt_tokens: u32,\n    pub completion_tokens: u32,\n    pub total_tokens: u32,\n}\n\n// =============================================================================\n// Tests (no mocking required)\n// =============================================================================\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_cloudflare_response_to_openai_response() {\n        let cf_resp = CloudflareResponse {\n            id: Some(\"test-id\".to_string()),\n            result: Some(CfResult {\n                messages: vec![CfResponseMessage {\n                    role: \"assistant\".to_string(),\n                    content: \"Hello from Cloudflare!\".to_string(),\n                }],\n                usage: Some(CfUsage {\n                    input_tokens: Some(10),\n                    output_tokens: Some(20),\n                }),\n            }),\n        };\n\n        let openai = cf_resp.to_openai_response(\"cloudflare/meta/llama-3.1-8b-instruct\", \"req-123\");\n\n        assert_eq!(openai.id, \"req-123\");\n        assert_eq!(openai.model, \"cloudflare/meta/llama-3.1-8b-instruct\");\n        assert_eq!(openai.choices.len(), 1);\n        assert_eq!(openai.choices[0].message.content, \"Hello from Cloudflare!\");\n        assert_eq!(openai.choices[0].message.role, \"assistant\");\n        assert_eq!(openai.choices[0].finish_reason, Some(\"stop\".to_string()));\n\n        assert!(openai.usage.is_some());\n        let usage = openai.usage.unwrap();\n        assert_eq!(usage.prompt_tokens, 10);\n        assert_eq!(usage.completion_tokens, 20);\n        assert_eq!(usage.total_tokens, 30);\n    }\n\n    #[test]\n    fn test_cloudflare_response_empty_messages() {\n        let cf_resp = CloudflareResponse {\n            id: Some(\"test-id\".to_string()),\n            result: Some(CfResult {\n                messages: vec![],\n                usage: None,\n            }),\n        };\n\n        let openai = cf_resp.to_openai_response(\"test-model\", \"req-456\");\n\n        assert_eq!(openai.choices[0].message.content, \"\");\n        assert!(openai.usage.is_none());\n    }\n\n    #[test]\n    fn test_cloudflare_response_no_result() {\n        let cf_resp = CloudflareResponse {\n            id: None,\n            result: None,\n        };\n\n        let openai = cf_resp.to_openai_response(\"test-model\", \"req-789\");\n\n        assert_eq!(openai.choices[0].message.content, \"\");\n        assert!(openai.usage.is_none());\n    }\n\n    #[test]\n    fn test_cloudflare_response_partial_usage() {\n        let cf_resp = CloudflareResponse {\n            id: Some(\"test-id\".to_string()),\n            result: Some(CfResult {\n                messages: vec![CfResponseMessage {\n                    role: \"assistant\".to_string(),\n                    content: \"Hi\".to_string(),\n                }],\n                usage: Some(CfUsage {\n                    input_tokens: Some(5),\n                    output_tokens: None,\n                }),\n            }),\n        };\n\n        let openai = cf_resp.to_openai_response(\"test-model\", \"req-101\");\n\n        assert_eq!(openai.usage.unwrap().total_tokens, 5);\n    }\n\n    #[test]\n    fn test_is_cloudflare_model_edge_cases() {\n        // Valid Cloudflare models\n        assert!(CloudflareClient::is_cloudflare_model(\"@cf/meta/llama-3.1-8b-instruct\"));\n        assert!(CloudflareClient::is_cloudflare_model(\"@cf/deepseek-ai/deepseek-r1-distill-qwen-32b\"));\n        assert!(CloudflareClient::is_cloudflare_model(\"@cf/google/gemma-2-2b-it\"));\n        assert!(CloudflareClient::is_cloudflare_model(\"@cf/mistral/mistral-7b-instruct\"));\n\n        // Not Cloudflare models (must start with @cf/)\n        assert!(!CloudflareClient::is_cloudflare_model(\"@cf\")); // just prefix\n        assert!(!CloudflareClient::is_cloudflare_model(\"cf/llama\")); // missing @\n        assert!(!CloudflareClient::is_cloudflare_model(\"@cfx/meta/llama\")); // extra char\n        assert!(!CloudflareClient::is_cloudflare_model(\"anthropic.claude-v1\"));\n        assert!(!CloudflareClient::is_cloudflare_model(\"bedrock/anthropic.claude-v1\")); // bedrock, not cloudflare\n        assert!(!CloudflareClient::is_cloudflare_model(\"\"));\n    }\n\n    #[test]\n    fn test_endpoint_url_building() {\n        // Test via the builder and inspection\n        let client = CloudflareClient::builder()\n            .account_id(\"test-account-id\")\n            .api_token(\"test-token\")\n            .base_url(\"https://api.cloudflare.com/client/v4/accounts\".to_string())\n            .build()\n            .unwrap();\n\n        // Use a workaround to test URL building - create client and check endpoint\n        // Since endpoint_url is private, we test through is_cloudflare_model which is public\n        assert!(CloudflareClient::is_cloudflare_model(\"@cf/meta/llama\"));\n    }\n\n    #[test]\n    fn test_cloudflare_client_builder_validation() {\n        // Missing account_id\n        let result = CloudflareClient::builder()\n            .api_token(\"token\")\n            .build();\n        assert!(result.is_err());\n        assert!(result.unwrap_err().contains(\"account_id\"));\n\n        // Missing api_token\n        let result = CloudflareClient::builder()\n            .account_id(\"account\")\n            .build();\n        assert!(result.is_err());\n        assert!(result.unwrap_err().contains(\"api_token\"));\n\n        // Valid\n        let result = CloudflareClient::builder()\n            .account_id(\"account\")\n            .api_token(\"token\")\n            .build();\n        assert!(result.is_ok());\n    }\n\n    #[test]\n    fn test_openai_response_serialization() {\n        let openai = OpenAiChatResponse {\n            id: \"test-id\".to_string(),\n            object: \"chat.completion\".to_string(),\n            created: 1234567890,\n            model: \"cloudflare/meta/llama\".to_string(),\n            choices: vec![OpenAiChoice {\n                index: 0,\n                message: OpenAiMessage {\n                    role: \"assistant\".to_string(),\n                    content: \"Hello\".to_string(),\n                },\n                finish_reason: Some(\"stop\".to_string()),\n            }],\n            usage: Some(OpenAiUsage {\n                prompt_tokens: 10,\n                completion_tokens: 20,\n                total_tokens: 30,\n            }),\n        };\n\n        let json = serde_json::to_string(\u0026openai).unwrap();\n        assert!(json.contains(\"\\\"id\\\":\\\"test-id\\\"\"));\n        assert!(json.contains(\"\\\"model\\\":\\\"cloudflare/meta/llama\\\"\"));\n        assert!(json.contains(\"\\\"content\\\":\\\"Hello\\\"\"));\n        assert!(json.contains(\"\\\"prompt_tokens\\\":10\"));\n        assert!(json.contains(\"\\\"completion_tokens\\\":20\"));\n    }\n\n    #[test]\n    fn test_openai_response_skip_optional_usage() {\n        let openai = OpenAiChatResponse {\n            id: \"test-id\".to_string(),\n            object: \"chat.completion\".to_string(),\n            created: 1234567890,\n            model: \"test\".to_string(),\n            choices: vec![],\n            usage: None,\n        };\n\n        let json = serde_json::to_string(\u0026openai).unwrap();\n        // usage field should be skipped when None\n        assert!(!json.contains(\"usage\"));\n    }\n}\n","traces":[{"line":33,"address":[20181968],"length":1,"stats":{"Line":3}},{"line":34,"address":[19629928],"length":1,"stats":{"Line":3}},{"line":37,"address":[21516816,21516790,21517041,21516528],"length":1,"stats":{"Line":3}},{"line":38,"address":[19335852,19335786],"length":1,"stats":{"Line":6}},{"line":39,"address":[19335971],"length":1,"stats":{"Line":3}},{"line":42,"address":[19696956,19696688],"length":1,"stats":{"Line":3}},{"line":43,"address":[19336140,19336074],"length":1,"stats":{"Line":6}},{"line":44,"address":[21517971,21517717],"length":1,"stats":{"Line":3}},{"line":49,"address":[19696663,19696432],"length":1,"stats":{"Line":2}},{"line":50,"address":[19696462,19696521],"length":1,"stats":{"Line":4}},{"line":51,"address":[19696643],"length":1,"stats":{"Line":2}},{"line":54,"address":[19631586,19629952,19631721],"length":1,"stats":{"Line":3}},{"line":55,"address":[22389142,22387526,22387672],"length":1,"stats":{"Line":8}},{"line":56,"address":[19630390,19630278],"length":1,"stats":{"Line":6}},{"line":5 his module is reserved for future persistence needs.\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","server","AWS-Bedrock-Wrapper-to-OpenAI-Compatible","src","interface","chat","chat_handler.rs"],"content":"//! Standard chat handler using Converse API\n\nuse crate::domain::chat::{get_model_capabilities, ChatRequest, Content};\nuse crate::domain::logging::ClickHouseLogger;\nuse crate::infrastructure::bedrock::converse::build_converse_payload;\nuse crate::infrastructure::cloudflare::CloudflareClient;\nuse crate::shared::app_state::AppState;\n\nuse aws_sdk_bedrockruntime::{\n    types::{\n        ContentBlock, ContentBlockDelta, ConverseOutput as OutputEnum,\n        ConverseStreamOutput as Out,\n    },\n    Client as RuntimeClient,\n};\nuse axum::{\n    extract::State,\n    http::{HeaderMap, StatusCode},\n    response::{\n        sse::{Event, KeepAlive, Sse},\n        IntoResponse, Response,\n    },\n    Json,\n};\nuse axum_extra::{\n    headers::{authorization::Bearer, Authorization},\n    TypedHeader,\n};\nuse futures_util::{Stream, StreamExt};\nuse serde::Serialize;\nuse std::{\n    convert::Infallible,\n    sync::Arc,\n    time::{Duration, SystemTime, UNIX_EPOCH},\n};\nuse tokio::time::timeout;\nuse uuid::Uuid;\n\nconst REQUEST_TIMEOUT: Duration = Duration::from_secs(60);\n\n/// Normalize model name to show provider clearly in responses\nfn normalize_model_name(model: \u0026str) -\u003e String {\n    if model.starts_with(\"@cf/\") {\n        model.replacen(\"@cf/\", \"cloudflare/\", 1)\n    } else {\n        model.replace(\"bedrock/\", \"aws/bedrock/\")\n    }\n}\n\n// Non-Stream Response Structure\n#[derive(Serialize)]\nstruct FullResponse\u003c'a\u003e {\n    id: \u0026'a str,\n    object: \u0026'static str,\n    created: u64,\n    model: \u0026'a str,\n    choices: [FullChoice\u003c'a\u003e; 1],\n    usage: Usage,\n}\n\n#[derive(Serialize)]\nstruct FullChoice\u003c'a\u003e {\n    index: u32,\n    message: FullMessage\u003c'a\u003e,\n    finish_reason: \u0026'static str,\n}\n\n#[derive(Serialize)]\nstruct FullMessage\u003c'a\u003e {\n    role: \u0026'static str,\n    content: \u0026'a str,\n}\n\n#[derive(Serialize)]\npub struct Usage {\n    pub input_tokens: u32,\n    pub output_tokens: u32,\n    pub total_tokens: u32,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub ttft_ms: Option\u003cu64\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub latency_ms: Option\u003cu64\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub tokens_per_second: Option\u003cf64\u003e,\n}\n\n#[derive(Serialize)]\npub struct ChatChunk\u003c'a\u003e {\n    pub id: \u0026'a str,\n    pub object: \u0026'static str,\n    pub created: u64,\n    pub model: \u0026'a str,\n    pub choices: \u0026'a [ChunkChoice\u003c'a\u003e],\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub usage: Option\u003cUsage\u003e,\n}\n\n#[derive(Serialize)]\npub struct ChunkChoice\u003c'a\u003e {\n    pub index: u32,\n    pub delta: ChunkDelta\u003c'a\u003e,\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub finish_reason: Option\u003cString\u003e,\n}\n\n#[derive(Serialize)]\npub struct ChunkDelta\u003c'a\u003e {\n    #[serde(skip_serializing_if = \"Option::is_none\")]\n    pub content: Option\u003c\u0026'a str\u003e,\n}\n\npub async fn chat_handler(\n    State(state): State\u003cAppState\u003e,\n    auth: Option\u003cTypedHeader\u003cAuthorization\u003cBearer\u003e\u003e\u003e,\n    headers: HeaderMap,\n    Json(req): Json\u003cChatRequest\u003e,\n) -\u003e Response {\n    let temp_user_email = match auth {\n        Some(TypedHeader(Authorization(bearer))) =\u003e match state.auth.authenticate(bearer.token()) {\n            Ok(email) =\u003e email,\n            Err(_) =\u003e return StatusCode::FORBIDDEN.into_response(),\n        },\n        None =\u003e return (StatusCode::UNAUTHORIZED, \"Missing API Key\").into_response(),\n    };\n\n    let user_email = if temp_user_email == \"chat\" {\n        headers\n            .get(\"x-openwebui-user-email\")\n            .and_then(|v| v.to_str().ok())\n            .unwrap_or(\"anonymous\")\n            .to_string()\n    } else {\n        temp_user_email\n    };\n\n    let message_id = headers\n        .get(\"x-openwebui-message-id\")\n        .and_then(|v| v.to_str().ok())\n        .map(|s| s.to_owned())\n        .unwrap_or_else(|| Uuid::new_v4().to_string());\n\n    let is_stream = req.stream.unwrap_or(true);\n\n    // Check if this is a Cloudflare model\n    let is_cloudflare = req.model.starts_with(\"@cf/\");\n\n    // Normalize model_name to show provider clearly\n    let model_name = normalize_model_name(\u0026req.model);\n\n    let model_id = req.model.clone().replace(\"bedrock/\", \"\");\n    let client = Arc::new(state.client.clone());\n    let logger = Arc::new(state.logger.clone());\n    let cloudflare_client = state.cloudflare_client.clone();\n\n    if is_cloudflare {\n        if let Some(cf_client) = cloudflare_client {\n            if is_stream {\n                let s = stream_cloudflare(cf_client, model_id, model_name, req, logger, user_email, message_id);\n                return Sse::new(s).keep_alive(KeepAlive::default()).into_response();\n            } else {\n                return non_stream_cloudflare(cf_client, model_id, model_name, req, logger, user_email, message_id).await;\n            }\n        } else {\n            return (StatusCode::SERVICE_UNAVAILABLE, \"Cloudflare client not configured\").into_response();\n        }\n    }\n\n    if is_stream {\n        let s = stream_converse(client, model_id, model_name, req, logger, user_email, message_id);\n        Sse::new(s).keep_alive(KeepAlive::default()).into_response()\n    } else {\n        non_stream(client, model_id, model_name, req, logger, user_email, message_id).await\n    }\n}\n\nfn stream_converse(\n    client: Arc\u003cRuntimeClient\u003e,\n    model_id: String,\n    model_name: String,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e impl Stream\u003cItem = Result\u003cEvent, Infallible\u003e\u003e {\n    let start_time = tokio::time::Instant::now();\n    let mut ttft_ms: Option\u003cu64\u003e = None;\n    let request_id = message_id;\n    let created = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_secs();\n\n    let payload = build_converse_payload(\u0026req);\n\n    async_stream::stream! {\n        let sdk_call = client.converse_stream()\n            .model_id(\u0026model_id)\n            .set_messages(Some(payload.messages))\n            .set_system(payload.system)\n            .inference_config(payload.inference_config)\n            .send();\n\n        let mut resp = match timeout(REQUEST_TIMEOUT, sdk_call).await {\n            Ok(Ok(r)) =\u003e r,\n            _ =\u003e { yield Ok(Event::default().data(r#\"{\"error\":\"Stream failed\"}\"#)); return; }\n        };\n\n        let mut metrics = (0u32, 0u32);\n\n        while let Ok(Some(event)) = resp.stream.recv().await {\n            match event {\n                Out::ContentBlockDelta(delta) =\u003e {\n                    if ttft_ms.is_none() {\n                        ttft_ms = Some(start_time.elapsed().as_millis() as u64);\n                    }\n                    if let Some(ContentBlockDelta::Text(t)) = delta.delta {\n                        let choices = [\n                            ChunkChoice {\n                                index: 0,\n                                delta: ChunkDelta {\n                                    content: Some(\u0026t)\n                                },\n                                finish_reason: None\n                            }];\n                        let chunk = ChatChunk {\n                            id: \u0026request_id,\n                            object: \"chat.completion.chunk\",\n                            created,\n                            model: \u0026model_name,\n                            choices: \u0026choices,\n                            usage: None\n                        };\n                        if let Ok(j) = serde_json::to_string(\u0026chunk) {\n                            yield Ok(Event::default().data(j));\n                        }\n                    }\n                }\n                Out::Metadata(m) =\u003e if let Some(u) = m.usage {\n                    metrics = (\n                        u.input_tokens as u32,\n                        u.output_tokens as u32\n                    );\n                }\n                Out::MessageStop(stop) =\u003e {\n                    let choices = [\n                        ChunkChoice {\n                            index: 0,\n                            delta: ChunkDelta {\n                                content: None\n                            },\n                            finish_reason: Some(\n                                format!(\"{:?}\", stop.stop_reason).to_lowercase()\n                            )\n                        }];\n                    let chunk = ChatChunk {\n                        id: \u0026request_id,\n                        object: \"chat.completion.chunk\",\n                        created,\n                        model: \u0026model_name,\n                        choices: \u0026choices,\n                        usage: None\n                    };\n                    if let Ok(j) = serde_json::to_string(\u0026chunk) {\n                        yield Ok(Event::default().data(j));\n                    }\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let total_duration_ms = start_time.elapsed().as_millis() as u64;\n        let (p, c) = metrics;\n\n        if p \u003e 0 || c \u003e 0 {\n            let ttft = ttft_ms.unwrap_or(total_duration_ms);\n            let gen_time_sec = (total_duration_ms.saturating_sub(ttft) as f64) / 1000.0;\n            let tps = if gen_time_sec \u003e 0.0 { c as f64 / gen_time_sec } else { 0.0 };\n\n            let usage_chunk = ChatChunk {\n                id: \u0026request_id,\n                object: \"chat.completion.chunk\",\n                created,\n                model: \u0026model_name,\n                choices: \u0026[],\n                usage: Some(Usage {\n                    input_tokens: p,\n                    output_tokens: c,\n                    total_tokens: p + c,\n                    ttft_ms: Some(ttft),\n                    latency_ms: Some(total_duration_ms),\n                    tokens_per_second: Some((tps * 100.0).round() / 100.0),\n                })\n            };\n            if let Ok(j) = serde_json::to_string(\u0026usage_chunk) {\n                yield Ok(Event::default().data(j));\n            }\n            spawn_log(logger, user_email, model_name, p, c);\n        }\n        yield Ok(Event::default().data(\"[DONE]\"));\n    }\n}\n\nasync fn non_stream(\n    client: Arc\u003cRuntimeClient\u003e,\n    model_id: String,\n    model_name: String,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e Response {\n    let start_time = tokio::time::Instant::now();\n    let payload = build_converse_payload(\u0026req);\n\n    let sdk_call = client\n        .converse()\n        .model_id(\u0026model_id)\n        .set_messages(Some(payload.messages))\n        .set_system(payload.system)\n        .inference_config(payload.inference_config)\n        .send();\n\n    let resp = match timeout(REQUEST_TIMEOUT, sdk_call).await {\n        Ok(Ok(output)) =\u003e output,\n        _ =\u003e return (StatusCode::BAD_GATEWAY, \"Bedrock Error\").into_response(),\n    };\n\n    let p = resp\n        .usage\n        .as_ref()\n        .map(|u| u.input_tokens as u32)\n        .unwrap_or(0);\n    let c = resp\n        .usage\n        .as_ref()\n        .map(|u| u.output_tokens as u32)\n        .unwrap_or(0);\n\n    let content = resp\n        .output\n        .and_then(|o| match o {\n            OutputEnum::Message(m) =\u003e Some(m),\n            _ =\u003e None,\n        })\n        .and_then(|m| m.content.into_iter().next())\n        .and_then(|cb| match cb {\n            ContentBlock::Text(t) =\u003e Some(t),\n            _ =\u003e None,\n        })\n        .unwrap_or_default();\n\n    spawn_log(logger, user_email, model_name.clone(), p, c);\n\n    let request_id = message_id;\n    let total_duration_ms = start_time.elapsed().as_millis() as u64;\n\n    let (p, c) = (\n        resp.usage\n            .as_ref()\n            .map(|u| u.input_tokens as u32)\n            .unwrap_or(0),\n        resp.usage\n            .as_ref()\n            .map(|u| u.output_tokens as u32)\n            .unwrap_or(0),\n    );\n\n    let tps = if total_duration_ms \u003e 0 {\n        (c as f64) / (total_duration_ms as f64 / 1000.0)\n    } else {\n        0.0\n    };\n\n    let full_resp = FullResponse {\n        id: \u0026request_id,\n        object: \"chat.completion\",\n        created: SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_secs(),\n        model: \u0026model_name,\n        choices: [FullChoice {\n            index: 0,\n            message: FullMessage {\n                role: \"assistant\",\n                content: \u0026content,\n            },\n            finish_reason: \"stop\",\n        }],\n        usage: Usage {\n            input_tokens: p,\n            output_tokens: c,\n            total_tokens: p + c,\n            ttft_ms: Some(total_duration_ms),\n            latency_ms: Some(total_duration_ms),\n            tokens_per_second: Some((tps * 100.0).round() / 100.0),\n        },\n    };\n\n    match serde_json::to_string(\u0026full_resp) {\n        Ok(json) =\u003e (StatusCode::OK, [(\"content-type\", \"application/json\")], json).into_response(),\n        Err(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR.into_response(),\n    }\n}\n\nfn spawn_log(logger: Arc\u003cClickHouseLogger\u003e, email: String, model: String, p: u32, c: u32) {\n    tokio::spawn(async move {\n        let _ = logger.log_usage(\u0026email, \u0026model, p, c);\n    });\n}\n\n// =============================================================================\n// Cloudflare Workers AI handlers\n// =============================================================================\n\nfn stream_cloudflare(\n    client: CloudflareClient,\n    model_id: String,\n    model_name: String,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e impl Stream\u003cItem = Result\u003cEvent, Infallible\u003e\u003e {\n    let start_time = tokio::time::Instant::now();\n    let mut ttft_ms: Option\u003cu64\u003e = None;\n    let request_id = message_id;\n    let created = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_secs();\n\n    async_stream::stream! {\n        let cf_resp = match client.chat_streaming(req).await {\n            Ok(r) =\u003e r,\n            Err(e) =\u003e {\n                yield Ok(Event::default().data(format!(r#\"{{\"error\":\"{}\"}}\"#, e)));\n                return;\n            }\n        };\n\n        let mut stream = cf_resp;\n        while let Some(chunk_result) = stream.next().await {\n            match chunk_result {\n                Ok(chunk) =\u003e {\n                    if ttft_ms.is_none() {\n                        ttft_ms = Some(start_time.elapsed().as_millis() as u64);\n                    }\n                    // Cloudflare returns SSE-like format, pass through\n                    yield Ok(Event::default().data(chunk));\n                }\n                Err(e) =\u003e {\n                    yield Ok(Event::default().data(format!(r#\"{{\"error\":\"{}\"}}\"#, e)));\n                }\n            }\n        }\n\n        yield Ok(Event::default().data(\"[DONE]\"));\n\n        let total_duration_ms = start_time.elapsed().as_millis() as u64;\n        if let Some(ttft) = ttft_ms {\n            let gen_time_sec = (total_duration_ms.saturating_sub(ttft) as f64) / 1000.0;\n            let tps: f64 = if gen_time_sec \u003e 0.0 { 0.0 } else { 0.0f64 };\n\n            let usage_chunk = ChatChunk {\n                id: \u0026request_id,\n                object: \"chat.completion.chunk\",\n                created,\n                model: \u0026model_name,\n                choices: \u0026[],\n                usage: Some(Usage {\n                    input_tokens: 0,\n                    output_tokens: 0,\n                    total_tokens: 0,\n                    ttft_ms: Some(ttft),\n                    latency_ms: Some(total_duration_ms),\n                    tokens_per_second: Some((tps * 100.0).round() / 100.0),\n                })\n            };\n            if let Ok(j) = serde_json::to_string(\u0026usage_chunk) {\n                yield Ok(Event::default().data(j));\n            }\n            spawn_log(logger, user_email, model_name.clone(), 0, 0);\n        }\n    }\n}\n\nasync fn non_stream_cloudflare(\n    client: CloudflareClient,\n    _model_id: String,\n    model_name: String,\n    req: ChatRequest,\n    logger: Arc\u003cClickHouseLogger\u003e,\n    user_email: String,\n    message_id: String,\n) -\u003e Response {\n    let start_time = tokio::time::Instant::now();\n    let cf_resp = match client.chat(req).await {\n        Ok(r) =\u003e r,\n        Err(e) =\u003e return (StatusCode::BAD_GATEWAY, e).into_response(),\n    };\n\n    let openai_resp = cf_resp.to_openai_response(\u0026model_name, \u0026message_id);\n    let p = openai_resp.usage.as_ref().map(|u| u.prompt_tokens).unwrap_or(0);\n    let c = openai_resp.usage.as_ref().map(|u| u.completion_tokens).unwrap_or(0);\n\n    let total_duration_ms = start_time.elapsed().as_millis() as u64;\n    let tps: f64 = if total_duration_ms \u003e 0 {\n        (c as f64) / (total_duration_ms as f64 / 1000.0)\n    } else {\n        0.0f64\n    };\n\n    let full_resp = FullResponse {\n        id: \u0026message_id,\n        object: \"chat.completion\",\n        created: SystemTime::now()\n            .duration_since(UNIX_EPOCH)\n            .unwrap_or_default()\n            .as_secs(),\n        model: \u0026model_name,\n        choices: [FullChoice {\n            index: 0,\n            message: FullMessage {\n                role: \"assistant\",\n                content: \u0026openai_resp.choices.first().map(|c| c.message.content.as_str()).unwrap_or(\"\"),\n            },\n            finish_reason: \"stop\",\n        }],\n        usage: Usage {\n            input_tokens: p,\n            output_tokens: c,\n            total_tokens: p + c,\n            ttft_ms: Some(total_duration_ms),\n            latency_ms: Some(total_duration_ms),\n            tokens_per_second: Some((tps * 100.0).round() / 100.0),\n        },\n    };\n\n    spawn_log(logger, user_email, model_name.clone(), p, c);\n\n    match serde_json::to_string(\u0026full_resp) {\n        Ok(json) =\u003e (StatusCode::OK, [(\"content-type\", \"application/json\")], json).into_response(),\n        Err(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR.into_response(),\n    }\n}\n\n// =============================================================================\n// Tests (no mocking required)\n// =============================================================================\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_normalize_model_name_cloudflare() {\n        assert_eq!(\n            normalize_model_name(\"@cf/meta/llama-3.1-8b-instruct\"),\n            \"cloudflare/meta/llama-3.1-8b-instruct\"\n        );\n        assert_eq!(\n            normalize_model_name(\"@cf/deepseek-ai/deepseek-r1\"),\n            \"cloudflare/deepseek-ai/deepseek-r1\"\n        );\n        assert_eq!(\n            normalize_model_name(\"@cf/google/gemma-2-2b-it\"),\n            \"cloudflare/google/gemma-2-2b-it\"\n        );\n    }\n\n    #[test]\n    fn test_normalize_model_name_bedrock() {\n        assert_eq!(\n            normalize_model_name(\"bedrock/anthropic.claude-3-5-sonnet-v1:0\"),\n            \"aws/bedrock/anthropic.claude-3-5-sonnet-v1:0\"\n        );\n        assert_eq!(\n            normalize_model_name(\"bedrock/deepseek.r1-v1:0\"),\n            \"aws/bedrock/deepseek.r1-v1:0\"\n        );\n    }\n\n    #[test]\n    fn test_normalize_model_name_no_prefix() {\n        // Models without bedrock/ prefix stay as-is\n        assert_eq!(\n            normalize_model_name(\"anthropic.claude-3-5-sonnet-v1:0\"),\n            \"anthropic.claude-3-5-sonnet-v1:0\"\n        );\n        assert_eq!(\n            normalize_model_name(\"deepseek.r1-v1:0\"),\n            \"deepseek.r1-v1:0\"\n        );\n    }\n\n    #[test]\n    fn test_normalize_model_name_multiple_bedrock() {\n        // replace() replaces ALL occurrences, not just the first one\n        assert_eq!(\n            normalize_model_name(\"bedrock/bedrock/anthropic.claude\"),\n            \"aws/bedrock/aws/bedrock/anthropic.claude\"\n        );\n    }\n\n    #[test]\n    fn test_normalize_model_name_empty() {\n        assert_eq!(normalize_model_name(\"\"), \"\");\n    }\n\n    #[test]\n    fn test_usage_serialization() {\n        let usage = Usage {\n            input_tokens: 100,\n            output_tokens: 200,\n            total_tokens: 300,\n            ttft_ms: Some(50),\n            latency_ms: Some(150),\n            tokens_per_second: Some(133.33),\n        };\n\n        let json = serde_json::to_string(\u0026usage).unwrap();\n        assert!(json.contains(\"\\\"input_tokens\\\":100\"));\n        assert!(json.contains(\"\\\"output_tokens\\\":200\"));\n        assert!(json.contains(\"\\\"total_tokens\\\":300\"));\n        assert!(json.contains(\"\\\"ttft_ms\\\":50\"));\n        assert!(json.contains(\"\\\"tokens_per_second\\\":133\"));\n    }\n\n    #[test]\n    fn test_usag     index: 0,\n                delta: ChunkDelta {\n                    content: Some(\"Hello\"),\n                },\n                finish_reason: None,\n            }],\n            usage: None,\n        };\n\n        let json = serde_json::to_string(\u0026chunk).unwrap();\n        assert!(json.contains(\"\\\"delta\\\":{\\\"content\\\":\\\"Hello\\\"}\"));\n        assert!(!json.contains(\"usage\")); // None, so skipped\n    }\n}\n","traces":[{"line":42,"address":[19888944],"length":1,"stats":{"Line":2}},{"line":43,"address":[21773394],"length":1,"stats":{"Line":2}},{"line":44,"address":[20210746],"length":1,"stats":{"Line":2}},{"line":46,"address":[19889031],"length":1,"stats":{"Line":2}},{"line":112,"address":[19886128],"length":1,"stats":{"Line":0}},{"line":118,"address":[21586964],"length":1,"stats":{"Line":0}},{"line":119,"address":[19843307,19843623],"length":1,"stats":{"Line":0}},{"line":120,"address":[19599294],"length":1,"stats":{"Line":0}},{"line":121,"address":[21587435],"length":1,"stats":{"Line":0}},{"line":123,"address":[19843523,19843404],"length":1,"stats":{"Line":0}},{"line":126,"address":[21587812,21588045,21587649,21587739],"length":1,"stats":{"Line":0}},{"line":127,"address":[19599646],"length":1,"stats":{"Line":0}},{"line":129,"address":[19850009,19844165,19850000],"length":1,"stats":{"Line":0}},{"line":133,"address":[19599577],"length":1,"stats":{"Line":0}},{"line":136,"address":[19844116],"length":1,"stats":{"Line":0}},{"line":138,"address":[21588113,21593465,21593456],"length":1,"stats":{"Line":0}},{"line":139,"address":[19599984,19605254,19605232],"length":1,"stats":{"Line":0}},{"line":140,"address":[19599991,19605328,19605341],"length":1,"stats":{"Line":0}},{"line":142,"address":[21588304,21588212],"length":1,"stats":{"Line":0}},{"line":145,"address":[19844577],"length":1,"stats":{"Line":0}},{"line":148,"address":[19844765,19844677],"length":1,"stats":{"Line":0}},{"line":150,"address":[19844799,19844888],"length":1,"stats":{"Line":0}},{"
